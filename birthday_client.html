<script>
  /**
 * Birthday Timeline 3D module.
 * - Render dữ liệu từ google.script.run.getEmployeesByMonth(month)
 * - Tạo hiệu ứng 3D theo vị trí item trên viewport bằng translateZ/scale/rotateY.
 * - Hover có sparkle + confetti nhẹ.
 */
  (function () {
      // GUARD CHẶN INIT CHẠY 2 LẦN
  if (window.__BIRTHDAY_INITED__) {
    return;
  }
  window.__BIRTHDAY_INITED__ = true;

    let currentMonth = new Date().getMonth() + 1;
    const loadingMonths = new Set();

    const loadQueue = [];
    let isProcessingQueue = false;

    const loadedMonths = new Set();

    const groupsEl = document.getElementById('groups');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('errorBox');
    const confettiCanvas = document.getElementById('confetti');
    const ctx = confettiCanvas.getContext('2d');

    let rafScheduled = false;
    let confettiParticles = [];
    let confettiRunning = false;

    function getNextMonth() {
      if (loadedMonths.size === 0) return currentMonth;
      return normalizeMonth(Math.max(...loadedMonths) + 1);
    }

    function getPrevMonth() {
      if (loadedMonths.size === 0) return currentMonth;
      return normalizeMonth(Math.min(...loadedMonths) - 1);
    }

    // Hàm chính để enqueue một tháng mới cần load, đảm bảo rằng chỉ có một yêu cầu load cho mỗi tháng tại một thời điểm,
    // và tránh việc enqueue trùng lặp cho cùng một tháng. Khi một tháng mới được enqueue, hàm sẽ thêm tháng đó vào loadQueue 
    // và gọi processQueue() để bắt đầu xử lý queue nếu chưa có quá trình nào đang chạy. 
    // Hàm này cũng đảm bảo cập nhật trạng thái loadingMonths để tránh việc load lại cùng một tháng nếu nó đã được enqueue 
    // hoặc đang trong quá trình load, giúp tối ưu hiệu năng và trải nghiệm người dùng.
    const requestedMonths = new Set();
    function enqueueLoad(month, direction) {
      month = normalizeMonth(month);

    function enqueueLoad(month, direction) {
      month = normalizeMonth(month);
      if (
        requestedMonths.has(month) ||
        loadedMonths.has(month) ||
        loadingMonths.has(month)
      ) {
        return;
      }

      requestedMonths.add(month); // đánh dấu NGAY lập tức

      const exists = loadQueue.some(j => j.month === month);
      if (exists) return;

      loadingMonths.add(month);

      loadQueue.push({ month, direction });
      processQueue();
    }

    // Hàm chính để xử lý queue load tháng mới: đảm bảo rằng chỉ có một tháng được load tại một thời điểm để tránh quá tải server 
    // và đảm bảo hiệu năng mượt mà cho người dùng. Khi một tháng mới được load xong, hàm sẽ tự động gọi processQueue() để tiếp tục 
    // xử lý các tháng còn lại trong queue, đảm bảo rằng các yêu cầu load tháng mới được thực hiện tuần tự và không bị bỏ sót. 
    // Hàm này cũng đảm bảo cập nhật trạng thái loadedMonths và loadingMonths để tránh việc load lại các tháng đã được load hoặc 
    // đang trong quá trình load, giúp tối ưu hiệu năng và trải nghiệm người dùng.
    function processQueue() {
      if (isProcessingQueue) return;
      if (!loadQueue.length) return;

      const job = loadQueue.shift();
      const { month, direction } = job;

      isProcessingQueue = true;
      toggleLoading(true);

      google.script.run
        .withSuccessHandler((res) => {
          if (res && res.success) {
            const realMonth = Number(res.month);

            renderMonth(realMonth, res.employees || [], direction);
            loadedMonths.add(realMonth);
          } else {
            loadedMonths.delete(month);
          }

          loadingMonths.delete(month);

          isProcessingQueue = false;
          toggleLoading(false);

          processQueue();
          update3DNodes();
        })
        .withFailureHandler(() => {
          loadingMonths.delete(month);
          loadedMonths.delete(month);
          isProcessingQueue = false;
          toggleLoading(false);

          processQueue();
        })
        .getEmployeesByMonth(month);
    }

    /** Khởi tạo module chính. */
    function initBirthday() {
      resizeConfettiCanvas();

      window.addEventListener('resize', resizeConfettiCanvas);
      window.addEventListener('scroll', onScroll, { passive: true });

      // load tháng hiện tại trước
      enqueueLoad(currentMonth, 'append');

      setTimeout(() => {
        enqueueLoad(currentMonth - 1, 'prepend');
      }, 300);

      setTimeout(() => {
        enqueueLoad(currentMonth + 1, 'append');
      }, 600);

      requestAnimationFrame(update3DNodes);
    }

    let lastScrollTop = 0;
    // Hàm xử lý sự kiện scroll: kiểm tra khi nào người dùng scroll gần đến cuối hoặc đầu trang để load thêm tháng mới tương ứng,
    // đồng thời sử dụng requestAnimationFrame để tối ưu hiệu năng khi cập nhật hiệu ứng 3D cho các node nhân sự trên trang, 
    // tránh việc cập nhật quá nhiều lần trong một khoảng thời gian ngắn khi người dùng scroll nhanh. 
    // Hàm này cũng đảm bảo rằng chỉ có một requestAnimationFrame được lên lịch tại một thời điểm để tránh tình trạng quá tải 
    // khi scroll liên tục.
    function onScroll() {
      if (!rafScheduled) {
        rafScheduled = true;
        requestAnimationFrame(() => {
          update3DNodes();
          rafScheduled = false;
        });
      }

      const scrollTop = window.scrollY;

      const nearBottom =
        document.documentElement.scrollHeight - (window.innerHeight + scrollTop) < 200;

      const nearTop = scrollTop < 200;

      // scroll xuống
      if (scrollTop > lastScrollTop && nearBottom) {
        const next = getNextMonth();
        enqueueLoad(next, 'append');

        const next2 = normalizeMonth(next + 1);
        enqueueLoad(next2, 'append');
      }

      // scroll lên
      if (scrollTop < lastScrollTop && nearTop) {
        const prev = getPrevMonth();
        enqueueLoad(prev, 'prepend');
      }

        lastScrollTop = scrollTop; // cập nhật cuối cùng
      }

    // Hàm chính để render tháng mới với dữ liệu nhân sự, được gọi sau khi nhận được dữ liệu từ server.
    // Hàm này sẽ tạo một section mới cho tháng đó, với tiêu đề và danh sách các node nhân sự. 
    // Mỗi node sẽ có hiệu ứng hover để tạo sparkle và confetti, và ảnh avatar sẽ được lazy load để tối ưu 
    // hiệu năng khi render nhiều tháng.  Sau khi render xong, hàm sẽ gọi initLazyImages để gắn observer cho các 
    // ảnh avatar mới, và cập nhật hiệu ứng 3D cho tất cả các node trên trang.
    function renderMonth(month, employees, direction) {
      month = Number(month);

      if (renderedMonths.has(month)) return;
      renderedMonths.add(month);

      //nếu đã có tháng này trong DOM thì không render nữa
      if (groupsEl.querySelector(`[data-month="${month}"]`)) {
        return;
      }

      const section = document.createElement('section');
      section.className = 'month-group';
      section.dataset.month = month;

      const title = document.createElement('h2');
      title.className = 'month-title';
      title.textContent = `Tháng ${month}`;

      const list = document.createElement('div');
      list.className = 'nodes';

      if (!employees.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Không có nhân sự trong tháng này.';
        list.appendChild(empty);
      } else {
        employees.forEach((emp, index) => {
          const node = document.createElement('article');
          node.className = `node ${index % 2 === 0 ? 'left' : 'right'}`;

          node.innerHTML = `
          <div class="node-inner">

            <!-- CỘT ẢNH -->
            <div class="node-avatar">
              ${emp.avatar
              ? `<img 
                      class="avatar-img loading"
                      src="${escapeHtml(emp.avatar)}"
                      alt="avatar"
                      loading="lazy"
                      onload="this.classList.remove('loading'); this.classList.add('loaded');"
                    />`
              : `<div class="avatar-fallback">
                      ${escapeHtml((emp.employeeName || 'A').charAt(0).toUpperCase())}
                    </div>`
            }

              <div class="emp-meta">
                <span class="emp-id">${escapeHtml(emp.employeeCode || '')}</span>
                <span class="emp-gender">
                  ${emp.gender === 'Nam'
              ? '👨'
              : emp.gender === 'Nữ'
                ? '👩'
                : '👤'
            }
                </span>
              </div>
            </div>

            <!-- CỘT THÔNG TIN -->
            <div class="node-info">
              <div class="name">${escapeHtml(emp.employeeName || '')}</div>
              <div class="birth">🎂 ${escapeHtml(emp.birthDate || '')}</div>
              <div class="department">🏢 ${escapeHtml(emp.employeeDepartment || '')}</div>
            </div>

          </div>
        `;

          // Hover effect: thêm sparkle + confetti nhẹ.
          node.addEventListener('mouseenter', (e) => {
            spawnSparkles(node, 7);
            blastConfetti(e.clientX, e.clientY, 26);
          });

          list.appendChild(node);
        });
      }

      section.appendChild(title);
      section.appendChild(list);

      setTimeout(initLazyImages, 50);

      if (direction === 'prepend') {
        const prevHeight = groupsEl.scrollHeight;

        groupsEl.prepend(section);

        const newHeight = groupsEl.scrollHeight;
        window.scrollBy(0, newHeight - prevHeight);
      } else {
        groupsEl.appendChild(section);
      }
    }

    // Hàm phụ trợ để thoát ký tự đặc biệt trong chuỗi và tránh lỗi XSS,
    // được sử dụng trong quá trình tạo HTML động cho node nhân sự để đảm bảo an toàn khi hiển thị dữ liệu từ server.
    // Đảm bảo rằng tất cả các ký tự đặc biệt trong tên nhân viên, ngày sinh, bộ phận, v.v. đều được mã hóa đúng cách 
    // trước khi chèn vào DOM, tránh lỗi hiển thị và lỗ hổng bảo mật. Đây là một phần quan trọng để đảm bảo rằng dữ liệu 
    // được hiển thị an toàn và không gây ra lỗi hoặc lỗ hổng bảo mật trên trang.
    function update3DNodes() {
      const nodes = document.querySelectorAll('.node');
      const centerY = window.innerHeight * 0.5;

      nodes.forEach((node) => {
        const rect = node.getBoundingClientRect();
        const nodeCenter = rect.top + rect.height * 0.5;
        const dist = Math.abs(centerY - nodeCenter);
        const norm = Math.min(dist / (window.innerHeight * 0.7), 1);
        const depth = (1 - norm) * 85;        // gần tâm => nổi ra trước (translateZ lớn)
        const scale = 0.86 + (1 - norm) * 0.24;
        const opacity = 0.35 + (1 - norm) * 0.65;
        const blur = norm * 1.8;

        const isLeft = node.classList.contains('left');
        const baseRotate = isLeft ? -12 : 12;
        const rotateY = baseRotate * norm;

        node.style.transform = `translateZ(${depth.toFixed(1)}px) scale(${scale.toFixed(3)}) rotateY(${rotateY.toFixed(2)}deg)`;
        node.style.opacity = '1';

        // Apply blur/opacity only to text/info, keep avatar crisp
        const info = node.querySelector('.node-info');
        if (info) {
          info.style.transition = 'opacity 220ms ease, filter 220ms ease';
          info.style.opacity = (0.35 + (1 - norm) * 0.65).toFixed(3);
          info.style.filter = blur ? `blur(${blur}px)` : 'none';
        }

        const avatarEl = node.querySelector('.node-avatar img, .node-avatar .avatar-fallback');
        if (avatarEl) {
          const avatarDepth = Math.min(depth + 12, 120);
          avatarEl.style.transform = `translateZ(${avatarDepth.toFixed(1)}px)`;
          avatarEl.style.filter = 'none';
          avatarEl.style.opacity = '1';
        }
      });
    }

    // Hiển thị hoặc ẩn box loading, được gọi khi bắt đầu hoặc kết thúc quá trình load dữ liệu tháng mới,
    // giúp người dùng có phản hồi trực quan về trạng thái tải dữ liệu. Khi loading bắt đầu, box sẽ hiển thị 
    // với thông điệp "Đang tải..." và khi quá trình load hoàn tất hoặc gặp lỗi, box sẽ được ẩn đi để trả lại 
    // giao diện sạch sẽ cho người dùng.
    function toggleLoading(show) {
      loadingEl.style.display = show ? 'block' : 'none';
    }

    // Hiển thị lỗi nếu có, hoặc ẩn box lỗi nếu message rỗng. 
    // Đồng thời đảm bảo reset trạng thái loading để người dùng có thể thử lại.
    function showError(message) {
      if (!message) {
        errorEl.style.display = 'none';
        errorEl.textContent = '';
        isLoading = false;
        toggleLoading(false);
        return;
      }

      errorEl.style.display = 'block';
      errorEl.textContent = message;
      isLoading = false;
      toggleLoading(false);
    }

    // Tạo hiệu ứng sparkle nhỏ khi hover node, với các chấm sáng có vị trí, kích thước và độ mờ ngẫu nhiên 
    // để tạo cảm giác tự nhiên. Hiệu ứng này được tối ưu để chạy mượt mà ngay cả trên thiết bị yếu, với việc 
    // tạo và xóa các phần tử sparkle một cách hiệu quả, tránh tạo quá nhiều phần tử cùng lúc và đảm bảo rằng 
    // chúng tự động biến mất sau một khoảng thời gian ngắn.
    function spawnSparkles(parent, count) {
      for (let i = 0; i < count; i += 1) {
        const dot = document.createElement('span');
        dot.className = 'sparkle';
        dot.style.left = `${12 + Math.random() * (parent.clientWidth - 24)}px`;
        dot.style.top = `${16 + Math.random() * (parent.clientHeight - 20)}px`;
        parent.appendChild(dot);
        setTimeout(() => dot.remove(), 900);
      }
    }

    // Tạo hiệu ứng confetti nhẹ khi hover node, với các hạt confetti có màu sắc ngẫu nhiên, vận tốc 
    // và góc bay khác nhau để tạo cảm giác tự nhiên. Hiệu ứng này được tối ưu để chạy mượt mà ngay cả trên thiết bị yếu, 
    // với việc sử dụng requestAnimationFrame để cập nhật vị trí và trạng thái của các hạt confetti theo thời gian, 
    // và tự động dừng hiệu ứng khi không còn hạt nào hoạt động.
    function blastConfetti(x, y, amount) {
      for (let i = 0; i < amount; i += 1) {
        confettiParticles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 4.8,
          vy: -1.5 - Math.random() * 3.6,
          life: 36 + Math.random() * 20,
          size: 2 + Math.random() * 3,
          color: ['#7b61ff', '#39d0ff', '#9fffcf', '#ffd166', '#ff7aa2'][Math.floor(Math.random() * 5)]
        });
      }

      if (!confettiRunning) {
        confettiRunning = true;
        requestAnimationFrame(runConfetti);
      }
    }

    // Hàm chính để chạy hiệu ứng confetti: cập nhật vị trí, vận tốc, độ mờ của từng hạt theo thời gian, 
    // và loại bỏ hạt khi hết "life". Khi không còn hạt nào, dừng hiệu ứng và xóa canvas để giải phóng tài nguyên, 
    // đảm bảo hiệu năng mượt mà ngay cả trên thiết bị yếu.
    function runConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      confettiParticles = confettiParticles.filter((p) => p.life > 0);
      confettiParticles.forEach((p) => {
        p.vy += 0.09;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;

        ctx.globalAlpha = Math.max(p.life / 60, 0);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size * 1.35);
      });

      if (confettiParticles.length > 0) {
        requestAnimationFrame(runConfetti);
      } else {
        confettiRunning = false;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // Hàm phụ trợ để lấy tháng lớn nhất đã được load, được sử dụng để xác định khi nào cần load thêm tháng mới 
    // khi người dùng scroll xuống dưới cùng của trang. Nếu không có tháng nào được load, 
    // hàm sẽ trả về tháng hiện tại để tránh lỗi logic khi so sánh tháng cần load tiếp theo. 
    // Nếu có các tháng đã được load, hàm sẽ trả về giá trị lớn nhất trong tập loadedMonths, 
    // giúp xác định tháng nào đã được load muộn nhất và từ đó quyết định khi nào cần load thêm tháng mới 
    // khi người dùng scroll xuống dưới cùng của trang.
    function getMaxLoadedMonth() {
      if (loadedMonths.size === 0) return currentMonth;
      return Math.max(...Array.from(loadedMonths));
    }

    // Hàm phụ trợ để lấy tháng nhỏ nhất đã được load, được sử dụng để xác định khi nào cần load thêm tháng mới 
    // khi người dùng scroll lên trên cùng của trang.  Nếu không có tháng nào được load, 
    // hàm sẽ trả về tháng hiện tại để tránh lỗi logic khi so sánh tháng cần load tiếp theo. 
    // Nếu có các tháng đã được load, hàm sẽ trả về giá trị nhỏ nhất trong tập loadedMonths, 
    // giúp xác định tháng nào đã được load sớm nhất và từ đó quyết định khi nào cần load thêm tháng mới 
    // khi người dùng scroll lên trên cùng của trang.
    function getMinLoadedMonth() {
      if (loadedMonths.size === 0) return currentMonth;
      return Math.min(...Array.from(loadedMonths));
    }

    // Hàm phụ trợ để thoát ký tự đặc biệt trong chuỗi và tránh lỗi XSS,
    // được sử dụng trong quá trình tạo HTML động cho node nhân sự để đảm bảo an toàn khi hiển thị dữ liệu từ server.
    // Đảm bảo rằng tất cả các ký tự đặc biệt trong tên nhân viên, ngày sinh, bộ phận, v.v. 
    // đều được mã hóa đúng cách trước khi chèn vào DOM, tránh lỗi hiển thị và lỗ hổng bảo mật.
    function resizeConfettiCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    // Hàm phụ trợ để thoát ký tự đặc biệt trong chuỗi và tránh lỗi XSS,
    // được sử dụng trong quá trình tạo HTML động cho node nhân sự để đảm bảo an toàn khi hiển thị dữ liệu từ server.
    // Đảm bảo rằng tất cả các ký tự đặc biệt trong tên nhân viên, ngày sinh, bộ phận, v.v. 
    // đều được mã hóa đúng cách trước khi chèn vào DOM, tránh lỗi hiển thị và lỗ hổng bảo mật.
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // IntersectionObserver để lazy load ảnh avatar khi gần viewport, 
    // tránh tải nhiều ảnh cùng lúc khi render nhiều tháng.
    // Khi một ảnh avatar được thêm vào DOM, nó sẽ có class "lazy-img" và sẽ được observer theo dõi.
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;

          // gán src khi gần viewport
          img.src = img.dataset.src;

          img.onload = () => {
            img.classList.add('loaded');
          };

          observer.unobserve(img);
        }
      });
    }, {
      rootMargin: '120px'
    });

    // Khởi tạo lazy loading cho ảnh avatar trong nodes tháng mới render, 
    // tránh tải nhiều ảnh cùng lúc khi render nhiều tháng.
    // Khi một tháng mới được render và các node nhân sự được thêm vào DOM,
    // hàm này sẽ được gọi để gắn observer cho tất cả các ảnh avatar có class "lazy-img" trong tháng đó, 
    // đảm bảo rằng chỉ những ảnh gần viewport mới được tải về, tối ưu hiệu năng và trải nghiệm người dùng.
    function initLazyImages() {
      document.querySelectorAll('.lazy-img').forEach(img => {
        observer.observe(img);
      });
    }

    function normalizeMonth(m) {
      if (m > 12) return ((m - 1) % 12) + 1;
      if (m < 1) return 12 - (Math.abs(m) % 12) + 1;
      return m;
    }

    window.initBirthday = initBirthday;
    // Khởi tạo module khi DOM sẵn sàng, đảm bảo rằng tất cả các phần tử cần thiết đã được tải trước khi bắt đầu render và gắn sự kiện. 
    // Việc này giúp tránh lỗi khi truy cập các phần tử DOM chưa tồn tại và đảm bảo rằng người dùng sẽ thấy 
    // giao diện được render một cách mượt mà ngay từ đầu.
    document.addEventListener('DOMContentLoaded', initBirthday);
  })();

</script>
