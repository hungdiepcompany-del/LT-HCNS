<div class="page-birthday">
  <style>
    :root {
      --bg: #060816;
      --bg-2: #0b1230;
      --neon-a: #7b61ff;
      --neon-b: #39d0ff;
      --neon-c: #9fffcf;
      --text: #eaf2ff;
      --muted: #9aa6cc;
      --line-glow: rgba(123, 97, 255, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    .page-birthday {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      background: transparent !important;
      overflow: hidden;
    }

    .hero {
      text-align: center;
      padding: 28px 16px 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3.6vw, 2.4rem);
      letter-spacing: 0.5px;
      text-shadow: 0 0 22px rgba(123, 97, 255, 0.45);
    }

    .hero p {
      margin: 10px auto 0;
      max-width: 760px;
      color: var(--muted);
    }

    .timeline-3d {
      position: relative;
      width: min(980px, 94vw);
      margin: 8px auto 30px;
      padding: 8px 0 120px;
      perspective: 1200px;
    }

    .axis {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(57, 208, 255, 0.15), rgba(123, 97, 255, 0.95), rgba(159, 255, 207, 0.2));
      box-shadow: 0 0 14px var(--line-glow), 0 0 42px rgba(57, 208, 255, 0.3);
    }

    .month-group {
      position: relative;
      margin: 22px 0 34px;
    }

    .month-title {
      position: sticky;
      top: 10px;
      z-index: 5;
      width: fit-content;
      margin: 0 auto 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      backdrop-filter: blur(6px);
      background: transparent !important;
      border: 1px solid rgba(123, 97, 255, 0.45);
      box-shadow: 0 0 15px rgba(123, 97, 255, 0.35);
    }

    .nodes {
      display: grid;
      gap: 14px;
    }

    .node {
      overflow: visible;
      position: relative;
      width: min(520px, calc(50% - 32px));
      min-height: 80px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(123, 97, 255, 0.35);
      background: transparent !important;
      box-shadow: 0 8px 22px rgba(4, 7, 16, 0.55), inset 0 0 0 1px rgba(57, 208, 255, 0.08);
      transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease, opacity 220ms ease;
      transform-style: preserve-3d;
    }

    .node.left {
      margin-right: auto;
      margin-left: 8px;
      transform-origin: right center;
    }

    .node.right {
      margin-left: auto;
      margin-right: 8px;
      transform-origin: left center;
    }

    .node::before {
      content: '';
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--neon-b));
      box-shadow: 0 0 14px rgba(57, 208, 255, 0.9);
      transform: translateY(-50%);
    }

    .node.left::before {
      right: -28px;
    }

    .node.right::before {
      left: -28px;
    }

    .name {
      margin: 0;
      font-size: 1.06rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .birth,
    .department {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .node:hover {
      transform: translateZ(40px) scale(1.04) rotateY(0deg) !important;
      box-shadow: 0 12px 26px rgba(11, 17, 42, 0.68), 0 0 20px rgba(123, 97, 255, 0.4);
      z-index: 7;
    }

    .node:hover .name::after {
      content: ' 🎉🎂';
      filter: drop-shadow(0 0 8px rgba(255, 199, 95, 0.65));
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #ffe188 50%, transparent 70%);
      animation: sparkle-float 850ms ease-out forwards;
      pointer-events: none;
    }

    @keyframes sparkle-float {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.4);
      }

      25% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-28px) scale(1.2);
      }
    }

    .empty,
    .loading,
    .error {
      text-align: center;
      color: var(--muted);
      margin: 10px auto;
      padding: 10px;
    }

    .error {
      max-width: 580px;
      color: #ffb8bf;
      border: 1px solid rgba(255, 143, 156, 0.45);
      border-radius: 10px;
      background: transparent !important;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }

    @media (max-width: 780px) {
      .node {
        width: calc(100% - 38px);
        margin-left: auto !important;
        margin-right: auto !important;
      }

      .node::before {
        left: 50% !important;
        right: auto !important;
        top: -7px;
        transform: translateX(-50%);
      }
    }

    .node-inner {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .node-avatar {
      position: relative;
      z-index: 2;
      width: 100px;
      min-width: 100px;
      text-align: center;
    }

    .node-avatar img,
    .avatar-fallback {
      width: 72px;
      height: 72px;
      border-radius: 50%;
    }

    .node-avatar img {
      object-fit: cover;
      border: 2.5px solid rgba(57, 208, 255, 0.8);
      box-shadow: 0 0 16px rgba(57, 208, 255, 0.8);
      transition: all 0.25s ease;
    }

    .avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7b61ff, #39d0ff);
      font-weight: bold;
    }

    .emp-meta {
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .emp-id {
      font-weight: 600;
    }

    .emp-gender {
      opacity: 0.8;
    }

    .node-info {
      flex: 1;
    }

    .node.left .node-info {
      text-align: right;
    }

    .node.right .node-info {
      text-align: left;
    }

    .node-info .name {
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .node-info .birth,
    .node-info .department {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .avatar-img {
      position: relative;
      z-index: 10; /* ensure above node background */
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(123, 97, 255, 0.4);
      box-shadow: 0 0 10px rgba(57, 208, 255, 0.4);
      filter: none;
      transform: translateZ(70px) scale(1);
      transition: transform 0.32s ease, box-shadow 0.28s ease, filter 0.32s ease, opacity 0.28s ease;
      will-change: transform, filter, opacity;
      backface-visibility: hidden;
    }

    .avatar-img.loading {
      filter: blur(6px);
      transform: translateZ(70px) scale(1.03);
      opacity: 0.98;
    }

    .avatar-img.loaded {
      filter: none;
      transform: translateZ(80px) scale(1);
      opacity: 1;
    }

    @media (max-width:1000px) {
      .timeline-3d {
        width: min(100%, 98vw);
      }
    }
  </style>

  <canvas id="confetti"></canvas>

  <header class="hero">
    <h1>Birthday Timeline 3D</h1>
    <p>Dòng thời gian sinh nhật theo từng tháng với hiệu ứng 3D, ánh sáng neon phát sáng và tương tác hover mượt mà</p>
  </header>

  <main id="timeline3D" class="timeline-3d">
    <div class="axis"></div>
    <div id="groups"></div>
    <div id="loading" class="loading" style="display:none;">Đang tải dữ liệu cho tháng tiếp theo...</div>
    <div id="errorBox" class="error" style="display:none;"></div>
  </main>
</div>
