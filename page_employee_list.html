<div class="page-employee-list">
  <style>

  </style> <!-- HEADER -->

<script>
if (window.__EMPLOYEELIST_INITED__) return;
window.__EMPLOYEELIST_INITED__ = true;

window.EmployeeListPage = (function () {
  // ============================
  // CONSTANTS & STATE
  // ============================
  var REFRESH_MS = 300000; // 5 phút
  var PAGE_SIZE = 25;

  var root = null,
      tableBody = null,
      pagination = null,
      meta = null,
      clock = null,
      listView = null,
      detailView = null,
      detailAvatar = null,
      detailName = null,
      detailDept = null,
      detailInfo = null,
      backBtn = null,
      searchInput = null,
      departmentSelect = null;

  var currentPage = 1,
      pageSize = PAGE_SIZE,
      employeeCache = [],
      employeeIndex = [],
      filteredCache = [],
      refreshTimerId = null,
      clockTimerId = null;

  // ============================
  // DOM QUERY
  // ============================
  function queryElements() {
    root = document.querySelector('.page-employee-list');
    if (!root) return false;

    tableBody = root.querySelector('#tableBody');
    pagination = root.querySelector('#pagination');
    meta = root.querySelector('#meta');
    clock = root.querySelector('#clock');
    listView = root.querySelector('#list-view');
    detailView = root.querySelector('#detail-view');
    detailAvatar = root.querySelector('#detailAvatar');
    detailName = root.querySelector('#detailName');
    detailDept = root.querySelector('#detailDept');
    detailInfo = root.querySelector('#detailInfo');
    backBtn = root.querySelector('#backBtn');
    searchInput = root.querySelector('#searchInput');
    departmentSelect = root.querySelector('#departmentSelect');

    return true;
  }

  // ============================
  // UTILITIES
  // ============================
  function debounce(fn, delay) {
    var timer = null;
    return function () {
      var args = Array.prototype.slice.call(arguments);
      clearTimeout(timer);
      timer = window.setTimeout(function () {
        fn.apply(null, args);
      }, delay);
    };
  }

  function normalizeGender(value) {
    var text = String(value || '').trim().toLowerCase();
    if (text === 'nam' || text === 'male') return 'nam';
    if (text === 'nữ' || text === 'nu' || text === 'female') return 'nu';
    return '';
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function buildSearchIndex(data) {
    employeeIndex = data.map(function (item) {
      var ma = String(item.ma || '').trim();
      var ten = String(item.ten || '').trim();
      return Object.assign({}, item, {
        maLower: ma.toLowerCase(),
        tenLower: ten.toLowerCase(),
        searchText: (ma + ' ' + ten).toLowerCase()
      });
    });
  }

  function paginateData(data, page, size) {
    var totalPages = Math.max(1, Math.ceil(data.length / size));
    var safePage = Math.min(Math.max(page, 1), totalPages);
    var start = (safePage - 1) * size;
    return {
      pageData: data.slice(start, start + size),
      totalPages: totalPages,
      page: safePage,
      total: data.length
    };
  }

  function highlightKeyword(text, keyword) {
    if (!keyword) return escapeHtml(text);
    var safe = escapeHtml(text);
    var escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp('(' + escapedKeyword + ')', 'ig'), '<mark>$1</mark>');
  }

  // ============================
  // RENDERING
  // ============================
  function renderRows(rows, keyword) {
    if (!tableBody) return;

    if (!rows.length) {
      tableBody.innerHTML = '<tr><td class="empty" colspan="7">Không tìm thấy nhân viên</td></tr>';
      return;
    }

    tableBody.innerHTML = rows.map(function (item, index) {
      var genderClass = normalizeGender(item.gioiTinh) ? 'gender-' + normalizeGender(item.gioiTinh) : '';
      return (
        '<tr class="' + genderClass + '" style="animation-delay:' + index * 20 + 'ms" data-ma="' + escapeHtml(item.ma) + '">' +
        '<td>' + highlightKeyword(item.ma, keyword) + '</td>' +
        '<td><strong>' + highlightKeyword(item.ten, keyword) + '</strong></td>' +
        '<td>' + escapeHtml(item.gioiTinh) + '</td>' +
        '<td>' + escapeHtml(item.ngaySinh) + '</td>' +
        '<td>' + escapeHtml(item.boPhan) + '</td>' +
        '<td>' + escapeHtml(item.viTri) + '</td>' +
        '<td>' + escapeHtml(item.capBac) + '</td>' +
        '</tr>'
      );
    }).join('');
  }

  function renderPagination(totalPages) {
    if (!pagination) return;
    if (totalPages <= 1) {
      pagination.innerHTML = '';
      return;
    }

    var pages = [];
    var start = Math.max(1, currentPage - 2);
    var end = Math.min(totalPages, start + 4);
    for (var p = start; p <= end; p++) pages.push(p);

    pagination.innerHTML =
      '<button class="page-btn" data-page="prev" ' + (currentPage === 1 ? 'disabled' : '') + '>« Trước</button>' +
      pages.map(function (p) {
        return '<button class="page-btn ' + (p === currentPage ? 'active' : '') + '" data-page="' + p + '">' + p + '</button>';
      }).join('') +
      '<button class="page-btn" data-page="next" ' + (currentPage === totalPages ? 'disabled' : '') + '>Tiếp »</button>';
  }

  function renderDepartmentFilter(items) {
    if (!departmentSelect) return;

    var selected = departmentSelect.value || 'all';
    var departments = items
      .map(function (item) { return String(item.boPhan || '').trim(); })
      .filter(Boolean)
      .filter(function (value, index, arr) { return arr.indexOf(value) === index; })
      .sort(function (a, b) { return a.localeCompare(b, 'vi'); });

    departmentSelect.innerHTML =
      '<option value="all">Tất cả</option>' +
      departments.map(function (dep) {
        return '<option value="' + escapeHtml(dep) + '">' + escapeHtml(dep) + '</option>';
      }).join('');

    if (selected !== 'all' && departments.indexOf(selected) !== -1) {
      departmentSelect.value = selected;
    }
  }

  function renderSkeleton(rows) {
    rows = typeof rows === 'number' ? rows : 12;
    if (!tableBody) return;

    tableBody.innerHTML = Array.from({ length: rows }).map(function () {
      return '<tr>' + Array.from({ length: 7 }).map(function () {
        return '<td><div class="skeleton-cell"></div></td>';
      }).join('') + '</tr>';
    }).join('');
  }

  function renderEmployees(employees, preservePage) {
    employeeCache = Array.isArray(employees) ? employees : [];
    buildSearchIndex(employeeCache);
    renderDepartmentFilter(employeeCache);

    var oldPage = currentPage;
    if (!preservePage) currentPage = 1;

    updateView();

    if (preservePage) {
      currentPage = oldPage;
      updateView();
    }
  }

  function renderError(error) {
    if (!tableBody || !meta) return;
    var message = (error && error.message) ? error.message : 'Không thể tải dữ liệu từ Google Sheets.';
    tableBody.innerHTML = '<tr><td class="error" colspan="7">⚠️ ' + escapeHtml(message) + '</td></tr>';
    meta.textContent = '❌ Lỗi tải dữ liệu';
  }

  // ============================
  // DATA HANDLING
  // ============================
  function updateView() {
    if (!searchInput || !departmentSelect) return;

    var keyword = searchInput.value.trim().toLowerCase();
    var selectedDepartment = departmentSelect.value;

    filteredCache = employeeIndex.filter(function (item) {
      var matchDepartment = selectedDepartment === 'all' || String(item.boPhan || '').trim() === selectedDepartment;
      var matchSearch = !keyword || item.searchText.indexOf(keyword) !== -1;
      return matchDepartment && matchSearch;
    });

    var result = paginateData(filteredCache, currentPage, pageSize);
    currentPage = result.page;

    if (tableBody) tableBody.style.opacity = '0';
    window.requestAnimationFrame(function () {
      renderRows(result.pageData, keyword);
      if (tableBody) tableBody.style.opacity = '1';
    });

    renderPagination(result.totalPages);

    if (meta) {
      meta.textContent = '📊 ' + result.total + '/' + employeeCache.length +
        ' • Trang ' + currentPage + '/' + result.totalPages +
        ' • ' + pageSize + '/trang';
    }
  }

  function loadData(showLoading) {
    if (showLoading) renderSkeleton();
    google.script.run
      .withSuccessHandler(function (data) { renderEmployees(data, true); })
      .withFailureHandler(renderError)
      .getEmployees();
  }

  // ============================
  // DETAIL VIEW
  // ============================
  function showDetailView(employee, avatarUrl) {
    if (!detailView || !listView) return;

    if (detailAvatar) detailAvatar.src = avatarUrl;
    if (detailName) detailName.textContent = (employee.ma || '') + ' - ' + (employee.ten || '');
    if (detailDept) detailDept.textContent = (employee.gioiTinh || '') + ' • ' + (employee.boPhan || '');

    if (detailInfo) {
      detailInfo.innerHTML = [
        ['CCCD', employee.cccd],
        ['BHXH', employee.bhxh],
        ['Ngày sinh', employee.ngaySinh],
        ['Điện thoại', employee.sdt],
        ['Email', employee.email],
        ['Trình độ', employee.trinhDo],
        ['Địa chỉ', employee.diaChi],
        ['Hôn nhân', employee.honNhan],
        ['Trạng thái', employee.trangThai],
        ['Thông tin thêm', employee.thongTinThem]
      ].map(function (pair) {
        return '<div class="info-item"><small>' + escapeHtml(pair[0]) +
               '</small><strong>' + escapeHtml(pair[1] || '—') + '</strong></div>';
      }).join('');
    }

    listView.classList.add('hidden');
    detailView.classList.remove('hidden');
    detailView.classList.remove('fade-in');
    void detailView.offsetWidth;
    detailView.classList.add('fade-in');
  }

  function showListView() {
    if (!detailView || !listView) return;

    detailView.classList.add('hidden');
    listView.classList.remove('hidden');
    listView.classList.remove('fade-in');
    void listView.offsetWidth;
    listView.classList.add('fade-in');
  }

  function handleRowClick(maNV) {
    var employee = employeeCache.find(function (item) { return item.ma === maNV; });
    if (!employee) return;

    google.script.run
      .withSuccessHandler(function (avatarUrl) { showDetailView(employee, avatarUrl); })
      .withFailureHandler(function () { showDetailView(employee, 'https://via.placeholder.com/320x320.png?text=No+Avatar'); })
      .getEmployeeAvatar(maNV);
  }

  // ============================
  // CLOCK
  // ============================
  function startClock() {
    if (!clock) return;

    function render() {
      var now = new Date();
      clock.textContent = '🕐 ' + now.toLocaleString('vi-VN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    render();
    clockTimerId = window.setInterval(render, 1000);
  }

  // ============================
  // EVENTS
  // ============================
  function bindEvents() {
    if (!root) return;

    // Event delegation
    root.addEventListener('click', function (event) {
      // Row click
      var row = event.target.closest('tr[data-ma]');
      if (row) {
        var maNV = row.dataset.ma || '';
        if (maNV) handleRowClick(maNV);
        return;
      }

      // Pagination
      var button = event.target.closest('button[data-page]');
      if (button) {
        var action = button.dataset.page;
        var totalPages = Math.max(1, Math.ceil(filteredCache.length / pageSize));
        if (action === 'prev' && currentPage > 1) currentPage -= 1;
        else if (action === 'next' && currentPage < totalPages) currentPage += 1;
        else if (/^\d+$/.test(action)) currentPage = Number(action);
        updateView();
        return;
      }

      // Back button
      if (event.target.closest('#backBtn')) {
        showListView();
        return;
      }
    });

    // Search input
    if (searchInput) {
      searchInput.addEventListener('input', debounce(function () {
        currentPage = 1;
        updateView();
      }, 200));
    }

    // Department select
    if (departmentSelect) {
      departmentSelect.addEventListener('change', function () {
        currentPage = 1;
        updateView();
      });
    }
  }

  // ============================
  // INIT & DESTROY
  // ============================
  function init() {
    if (!queryElements()) return;

    destroy();
    bindEvents();

    currentPage = 1;
    pageSize = PAGE_SIZE;
    employeeCache = [];
    employeeIndex = [];
    filteredCache = [];

    loadData(true);
    startClock();

    refreshTimerId = window.setInterval(function () {
      loadData(false);
    }, REFRESH_MS);
  }

  function destroy() {
    if (refreshTimerId) {
      window.clearInterval(refreshTimerId);
      refreshTimerId = null;
    }
    if (clockTimerId) {
      window.clearInterval(clockTimerId);
      clockTimerId = null;
    }
  }

  // ============================
  // PUBLIC API
  // ============================
  return {
    init: init,
    destroy: destroy,
    rebind: bindEvents
  };
})();
</script>
