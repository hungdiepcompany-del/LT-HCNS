<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Hành chính - Nhân sự</title>
  <link rel="dns-prefetch" href="//script.google.com" />
  <link rel="dns-prefetch" href="//script.googleusercontent.com" />
  <link rel="preconnect" href="https://script.google.com" crossorigin />
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin />
  <style>
    /* =============================
         THEME TOKENS
      ============================== */
    :root {
      --bg-root: #060816;
      --bg-main: #0b1230;
      --bg-card: #111b43;
      --bg-card-soft: #0f1a41;

      --text-primary: #eef2ff;
      --text-secondary: #a1b0db;

      --accent-blue: #4da3ff;
      --accent-purple: #8b5cf6;
      --accent-cyan: #20e3ff;

      --ok: #1dd8a7;
      --warn: #ffcc66;
      --bad: #ff6b8a;

      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;

      --border-soft: 1px solid rgba(120, 145, 255, 0.26);
      --shadow-soft: 0 10px 30px rgba(8, 14, 40, 0.5);
      --shadow-glow: 0 0 0 1px rgba(124, 171, 255, 0.3), 0 14px 30px rgba(65, 133, 255, 0.24);

      --sidebar-width: 260px;
      --transition: 0.22s ease;
      --dashboard-trial-height: clamp(320px, 42vh, 520px);
      --dashboard-birthday-height: clamp(420px, 62vh, 720px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-primary);
      background: radial-gradient(circle at 18% -8%, #1d2f73 0%, var(--bg-root) 42%), var(--bg-root);
    }

    body {
      display: flex;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      display: none;
      width: 100%;
    }

    .app-shell.is-ready {
      display: flex;
    }

    .auth-shell {
      flex: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px 16px;
    }

    .auth-boot-card {
      display: grid;
      gap: 14px;
      justify-items: center;
      text-align: center;
    }

    .auth-boot-spinner {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 3px solid rgba(120, 191, 255, 0.18);
      border-top-color: #83f5ff;
      box-shadow: 0 0 24px rgba(77, 163, 255, 0.18);
      animation: auth-spin 0.9s linear infinite;
    }

    .auth-boot-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 700;
      color: #eef5ff;
    }

    .auth-boot-text {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    @keyframes auth-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .auth-card {
      width: min(440px, 100%);
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(120, 145, 255, 0.26);
      background:
        radial-gradient(circle at top right, rgba(32, 227, 255, 0.16), transparent 35%),
        linear-gradient(160deg, rgba(17, 27, 67, 0.94), rgba(11, 18, 48, 0.98));
      box-shadow: 0 18px 48px rgba(8, 14, 40, 0.55);
    }

    .auth-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(120, 191, 255, 0.28);
      background: rgba(77, 163, 255, 0.12);
      color: #9fd6ff;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .auth-title {
      margin: 14px 0 8px;
      font-size: clamp(1.6rem, 4vw, 2rem);
      line-height: 1.1;
    }

    .auth-subtitle {
      margin: 0 0 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .auth-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .auth-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(120, 145, 255, 0.2);
      color: #d7e4ff;
      font-size: 0.8rem;
    }

    .auth-grid {
      display: grid;
      gap: 12px;
    }

    .auth-step,
    .auth-actions {
      overflow: hidden;
      max-height: 140px;
      opacity: 1;
      transform: translateY(0);
      transition:
        max-height 0.28s ease,
        opacity 0.22s ease,
        transform 0.22s ease,
        margin 0.22s ease;
    }

    .auth-step.is-collapsed,
    .auth-actions.is-collapsed {
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      margin-top: -12px;
    }

    .auth-field {
      display: grid;
      gap: 7px;
    }

    .auth-field label {
      font-size: 0.86rem;
      color: #c9d7ff;
      font-weight: 600;
    }

    .auth-field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(120, 145, 255, 0.32);
      background: rgba(7, 13, 36, 0.78);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .auth-field input:focus {
      border-color: rgba(120, 191, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(77, 163, 255, 0.15);
      transform: translateY(-1px);
    }

    .auth-inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .captcha-box {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed rgba(120, 191, 255, 0.38);
      background: rgba(77, 163, 255, 0.08);
      color: #dff3ff;
      font-weight: 600;
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .auth-alert {
      margin-bottom: 14px;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 204, 102, 0.24);
      background: rgba(255, 204, 102, 0.1);
      color: #ffe2a3;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .auth-actions {
      display: flex;
      gap: 12px;
      flex-wrap: nowrap;
      margin-top: 6px;
    }

    .auth-btn {
      min-width: 0;
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    }

    .auth-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .auth-btn.primary {
      color: #081225;
      background: linear-gradient(135deg, #83f5ff, #71b5ff);
      box-shadow: 0 14px 24px rgba(77, 163, 255, 0.28);
    }

    .auth-btn.secondary {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(120, 145, 255, 0.28);
    }

    .auth-message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 0.9rem;
    }

    .auth-message.is-error {
      color: #ff96ab;
    }

    .auth-message.is-success {
      color: #7af3d5;
    }

    .auth-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 0.84rem;
    }

    .countdown-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 204, 102, 0.12);
      color: #ffd98a;
      border: 1px solid rgba(255, 204, 102, 0.24);
    }

    /* =============================
         SIDEBAR
      ============================== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      width: var(--sidebar-width);
      min-height: 100vh;
      padding: 22px 16px;
      border-right: var(--border-soft);
      background: linear-gradient(180deg, rgba(11, 18, 48, 0.95), rgba(7, 12, 35, 0.96));
      box-shadow: 14px 0 30px rgba(7, 10, 28, 0.42);
      backdrop-filter: blur(7px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      background: linear-gradient(125deg, rgba(77, 163, 255, 0.14), rgba(139, 92, 246, 0.18));
      border: 1px solid rgba(127, 153, 245, 0.4);
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: #fff;
      box-shadow: 0 7px 16px rgba(84, 114, 255, 0.42);
    }

    .brand-copy {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 2px;
    }

    .brand-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.93rem;
      font-weight: 500;
      letter-spacing: 0.1px;
      color: #f3f6ff;
    }

    .brand-subtitle {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 400;
      color: #9fb2ea;
    }

    .menu-caption {
      margin: 8px 10px 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.77rem;
      letter-spacing: 1px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 9px;
    }

    .menu-item {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      color: var(--text-secondary);
      background: rgba(19, 29, 72, 0.35);
      font-size: 0.95rem;
      font-weight: 550;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), color var(--transition);
    }

    .menu-item:hover {
      color: var(--text-primary);
      transform: translateX(4px) scale(1.01);
      border-color: rgba(112, 180, 255, 0.45);
      box-shadow: 0 10px 22px rgba(33, 61, 150, 0.36), 0 0 22px rgba(32, 227, 255, 0.12);
    }

    .menu-item.active {
      color: #fff;
      border-color: rgba(135, 183, 255, 0.58);
      background: linear-gradient(120deg, rgba(77, 163, 255, 0.2), rgba(139, 92, 246, 0.2));
      box-shadow: var(--shadow-glow);
    }

    /* nav dot */
    .menu-item .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      /* faint by default */
      margin-right: 10px;
      transform: scale(0.6);
      opacity: 0.22;
      transition: background-color 260ms ease, transform 260ms ease, opacity 260ms ease, box-shadow 260ms ease;
      will-change: transform, opacity;
    }

    /* fully hidden alternative (use if you want dot removed instead of dim) */
    /* .menu-item .dot { opacity:0; transform:scale(0.5); } */

    /* active nav item: neon green dot with glow */
    .menu-item.active .dot {
      background: linear-gradient(180deg, #7CFF57, #3EDB2A);
      box-shadow: 0 0 8px rgba(124, 255, 87, 0.6), 0 0 20px rgba(62, 219, 42, 0.14);
      transform: scale(1);
      opacity: 1;
    }

    .sidebar-footer {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(120, 145, 255, 0.16);
      display: grid;
      gap: 12px;
    }

    .sidebar-online {
      position: relative;
      padding: 9px 11px;
      border-radius: 12px;
      border: 1px solid rgba(29, 216, 167, 0.2);
      background: rgba(29, 216, 167, 0.07);
      color: #bdf7e7;
      font-size: 0.78rem;
      line-height: 1.35;
      cursor: default;
    }

    .sidebar-online strong {
      color: #ecfff9;
      font-weight: 700;
    }

    .sidebar-online-list {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 45;
      width: min(300px, calc(var(--sidebar-width) - 24px));
      max-height: 220px;
      overflow: auto;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(120, 145, 255, 0.28);
      background: rgba(7, 12, 35, 0.98);
      box-shadow: var(--shadow-soft);
      color: #dbe7ff;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity var(--transition), transform var(--transition);
    }

    .sidebar-online:hover .sidebar-online-list {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .sidebar-online-list div {
      padding: 6px 7px;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.04);
      overflow-wrap: anywhere;
    }

    .sidebar-online-list div + div {
      margin-top: 6px;
    }

    .menu-item-logout {
      color: #ffd2dc;
      background: rgba(255, 107, 138, 0.08);
      border-color: rgba(255, 107, 138, 0.2);
    }

    .menu-item-logout:hover {
      border-color: rgba(255, 145, 171, 0.42);
      box-shadow: 0 10px 22px rgba(125, 33, 78, 0.28);
    }

    .sidebar-version {
      padding: 0 4px;
      font-size: 0.76rem;
      color: #8ea3d5;
      letter-spacing: 0.3px;
    }

    .sidebar-version span {
      color: #d9e5ff;
      font-weight: 600;
    }

    /* =============================
         APP WRAPPER + HEADER
      ============================== */
    .app {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      padding: 24px 28px 34px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .header-title {
      margin: 0;
      font-size: clamp(1.3rem, 2.1vw, 1.9rem);
    }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search {
      width: min(380px, 46vw);
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(114, 145, 255, 0.32);
      background: rgba(17, 27, 67, 0.72);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .search input {
      border: none;
      background: transparent;
      width: 100%;
      outline: none;
      color: var(--text-primary);
      font-size: 0.92rem;
    }

    .search input::placeholder {
      color: #8394bf;
    }

    .dashboard-search-button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #dff3ff;
      background: rgba(77, 163, 255, 0.12);
      cursor: pointer;
      transition: transform var(--transition), background var(--transition);
    }

    .dashboard-search-button:hover {
      transform: translateY(-1px);
      background: rgba(77, 163, 255, 0.22);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      border: 1px solid rgba(187, 197, 255, 0.3);
      box-shadow: 0 10px 20px rgba(82, 109, 231, 0.45);
    }

    /* =============================
         COMMON CARD
      ============================== */
    .card {
      border-radius: var(--radius-xl);
      border: var(--border-soft);
      background: linear-gradient(160deg, rgba(17, 27, 67, 0.88), rgba(11, 18, 48, 0.97));
      box-shadow: var(--shadow-soft);
    }

    /* =============================
         KPI GRID
      ============================== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .kpi-card {
      padding: 16px;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .kpi-card:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(120, 191, 255, 0.5);
      box-shadow: 0 16px 30px rgba(9, 18, 51, 0.65), 0 0 26px rgba(79, 133, 255, 0.19);
    }

    .kpi-label {
      margin-bottom: 8px;
      font-size: 0.84rem;
      color: var(--text-secondary);
    }

    .kpi-number {
      margin-bottom: 8px;
      font-size: 1.66rem;
      font-weight: 750;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.8rem;
    }

    .chip.pos {
      background: rgba(29, 216, 167, 0.14);
      color: var(--ok);
    }

    .chip.neu {
      background: rgba(77, 163, 255, 0.14);
      color: #7ec4ff;
    }

    .chip.neg {
      background: rgba(255, 107, 138, 0.14);
      color: var(--bad);
    }

    .chip.warn {
      background: rgba(255, 204, 102, 0.14);
      color: #ffd98a;
    }

    .chip-detail {
      display: inline-block;
      max-width: 100%;
      white-space: normal;
      line-height: 1.4;
    }

    /* =============================
         MAIN GRID
      ============================== */
    .main-grid {
      display: grid;
      grid-template-columns: 3fr 0.9fr;
      gap: 16px;
      align-items: start;
    }

    /* aside toàn bộ chiều cao cột trái */
    .main-grid > aside {
      min-height: 0;
    }

    .panel {
      padding: 16px;
    }

    .panel+.panel {
      margin-top: 16px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
    }

    .panel-meta {
      color: var(--text-secondary);
      font-size: 0.84rem;
    }

    .dashboard-trial-panel,
    .dashboard-birthday-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .dashboard-trial-panel {
      height: var(--dashboard-trial-height);
    }

    .dashboard-birthday-panel {
      height: var(--dashboard-birthday-height);
    }

    .dashboard-trial-panel .table-wrap,
    .dashboard-birthday-panel .birthday-wheel-wrap {
      flex: 1;
      min-height: 0;
    }

    .dashboard-trial-panel .table-wrap {
      overflow: auto;
      border-radius: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 145, 255, 0.42) rgba(90, 104, 156, 0.16);
    }

    .dashboard-trial-panel .table-wrap::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .dashboard-trial-panel .table-wrap::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(120, 145, 255, 0.42);
    }

    .dashboard-trial-panel table {
      border-collapse: separate;
      border-spacing: 0 7px;
    }

    .dashboard-trial-panel tbody td {
      background: rgba(14, 23, 58, 0.48);
      border-top: 1px solid rgba(109, 130, 201, 0.14);
      border-bottom: 1px solid rgba(109, 130, 201, 0.14);
    }

    .dashboard-trial-panel tbody td:first-child {
      border-radius: 11px 0 0 11px;
      border-left: 1px solid rgba(109, 130, 201, 0.14);
    }

    .dashboard-trial-panel tbody td:last-child {
      border-radius: 0 11px 11px 0;
      border-right: 1px solid rgba(109, 130, 201, 0.14);
    }

    .dashboard-trial-panel tbody tr[data-employee] {
      cursor: pointer;
      transition: background var(--transition);
    }

    .dashboard-trial-panel tbody tr[data-employee]:hover {
      background: rgba(77, 163, 255, 0.08);
    }

    .dashboard-trial-panel tbody tr.gender-male td:first-child,
    .dashboard-search-table-wrap tbody tr.gender-male td:first-child {
      border-left: 3px solid var(--accent-cyan);
      border-top-left-radius: 11px;
      border-bottom-left-radius: 11px;
    }

    .dashboard-trial-panel tbody tr.gender-female td:first-child,
    .dashboard-search-table-wrap tbody tr.gender-female td:first-child {
      border-left: 3px solid #ff6b8a;
      border-top-left-radius: 11px;
      border-bottom-left-radius: 11px;
    }

    /* =============================
         CHART BLOCKS
      ============================== */
    .charts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(92, 117, 208, 0.35);
      background: rgba(10, 18, 50, 0.74);
      padding: 14px;
      position: relative;
    }

    .chart-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
    }

    .dept-bars {
      display: grid;
      gap: 10px;
    }

    .dept-row {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) 1fr 42px;
      gap: 8px;
      align-items: center;
      font-size: 0.84rem;
    }

    .dept-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(90, 104, 156, 0.25);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      box-shadow: 0 0 18px rgba(92, 154, 255, 0.4);
    }

    .line-chart {
      width: 100%;
      height: 180px;
      display: block;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(23, 37, 90, 0.35), rgba(14, 22, 55, 0.15));
    }

    .chart-legend {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 0.76rem;
      line-height: 1.25;
    }

    .chart-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .chart-legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 10px rgba(255,255,255,0.12);
    }

    .chart-tooltip {
      position: absolute;
      z-index: 6;
      min-width: 172px;
      max-width: min(230px, calc(100% - 20px));
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(120,145,255,0.34);
      background: rgba(8, 14, 38, 0.96);
      box-shadow: 0 18px 38px rgba(0,0,0,0.34);
      color: var(--text-primary);
      font-size: 0.78rem;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -100%);
      transition: opacity 120ms ease;
    }

    .chart-tooltip.is-visible {
      opacity: 1;
    }

    .chart-tooltip strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
    }

    .chart-tooltip div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 3px;
    }

    .muted {
      color: var(--text-secondary);
      font-size: 0.82rem;
    }

    /* =============================
         QUICK TABLE
      ============================== */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th,
    td {
      text-align: left;
      padding: 11px 10px;
      border-bottom: 1px solid rgba(109, 130, 201, 0.2);
    }

    th {
      font-weight: 600;
      color: #9fb2ea;
    }

    tbody tr {
      transition: background var(--transition);
    }

    tbody tr:hover {
      background: rgba(72, 108, 226, 0.14);
    }

    .badge-new {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 99px;
      font-size: 0.74rem;
      background: rgba(29, 216, 167, 0.12);
      color: #7af3d5;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 99px;
      font-size: 0.74rem;
      border: 1px solid transparent;
    }

    .status-badge.is-active {
      background: rgba(29, 216, 167, 0.12);
      color: #7af3d5;
    }

    .status-badge.is-trial {
      background: rgba(255, 204, 102, 0.14);
      color: #ffd98a;
      border-color: rgba(255, 204, 102, 0.24);
    }

    .status-badge.is-inactive {
      background: rgba(255, 107, 138, 0.14);
      color: #ff9bb1;
      border-color: rgba(255, 107, 138, 0.24);
    }

    .status-badge.is-neutral {
      background: rgba(77, 163, 255, 0.14);
      color: #a9d6ff;
      border-color: rgba(77, 163, 255, 0.24);
    }

    /* =============================
         BIRTHDAY TIMELINE
      ============================== */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
    }

    .timeline-date {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 650;
      color: #fff;
      background: linear-gradient(145deg, rgba(77, 163, 255, 0.9), rgba(139, 92, 246, 0.9));
      box-shadow: 0 6px 16px rgba(80, 105, 220, 0.4);
    }

    .timeline-content {
      border-radius: 12px;
      border: 1px solid rgba(110, 133, 227, 0.24);
      background: rgba(14, 23, 58, 0.72);
      padding: 10px 12px;
    }

    .timeline-content strong {
      display: block;
      margin-bottom: 4px;
    }

    /* =============================
         RESPONSIVE
      ============================== */
    @media (max-width: 1200px) {
      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .charts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      body {
        flex-direction: column;
      }

      .app-shell.is-ready {
        display: block;
      }

      .sidebar {
        position: static;
        width: 100%;
        min-height: auto;
        border-right: none;
        border-bottom: var(--border-soft);
      }

      .app {
        margin-left: 0;
        width: 100%;
        padding: 18px 16px 26px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .search {
        width: 100%;
      }

      .charts {
        grid-template-columns: 1fr;
      }

      .dashboard-trial-panel {
        height: var(--dashboard-trial-height);
      }

      .dashboard-birthday-panel {
        height: var(--dashboard-birthday-height);
      }

      .employee-detail-modal-overlay {
        padding: 14px;
      }

      .employee-detail-modal {
        padding: 18px;
      }

      .dashboard-detail-layout,
      .dashboard-info-grid {
        grid-template-columns: 1fr;
      }

      .auth-card {
        width: min(100%, 380px);
        padding: 18px 16px;
      }

      .auth-inline {
        grid-template-columns: 1fr;
      }

      .auth-actions {
        flex-direction: column;
      }
    }

    /* =============================
         BIRTHDAY WHEEL
      ============================== */
    .birthday-wheel-wrap {
      position: relative;
      flex: 1;          /* fill space còn lại trong card */
      min-height: 260px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .birthday-wheel {
      flex: 1;          /* fill h\u1ebft birthday-wheel-wrap */
      min-height: 0;    /* b\u1eaft bu\u1ed9c c\u1ea7n thi\u1ebft v\u1edbi flex overflow */
      overflow-y: auto;
      scroll-behavior: auto;
      padding: 14px 0;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }

    .birthday-wheel-wrap::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      z-index: 3;
      width: 0;
      height: 0;
      transform: translateY(-50%);
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 16px solid var(--accent-cyan);
      filter: drop-shadow(0 0 10px rgba(32, 227, 255, 0.58));
      pointer-events: none;
    }

    .birthday-wheel::-webkit-scrollbar {
      display: none;
    }

    .birthday-wheel.is-dragging {
      cursor: grabbing;
      scroll-behavior: auto;
    }

    .birthday-wheel-fade {
      position: absolute;
      left: 0; right: 0;
      height: 80px;
      pointer-events: none;
      z-index: 2;
    }

    .birthday-wheel-fade--top {
      top: 0;
      background: linear-gradient(to bottom, rgba(11,18,48,0.96), transparent);
    }

    .birthday-wheel-fade--bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(11,18,48,0.96), transparent);
    }

    .birthday-wheel .timeline-item {
      transition: opacity 0.15s ease, transform 0.15s ease;
      transform-origin: center;
      will-change: opacity, transform;
    }

    .birthday-wheel .timeline-item.bw-focus {
      opacity: 1 !important;
      transform: scale(1.03) !important;
    }

    .birthday-wheel .timeline-item.bw-upcoming {
      padding-left: 6px;
      border-radius: 4px;
    }

    .birthday-wheel .timeline-item.bw-today {
      padding-left: 6px;
      background: rgba(29, 216, 167, 0.06);
    }

    .birthday-wheel .timeline-item.birthday-gender-male {
      border-left: 3px solid var(--accent-cyan);
      padding-left: 6px;
      border-radius: 4px;
    }

    .birthday-wheel .timeline-item.birthday-gender-female {
      border-left: 3px solid #ff6b8a;
      padding-left: 6px;
      border-radius: 4px;
    }

    .birthday-person-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 110px;
      align-items: center;
      gap: 12px;
    }

    .birthday-person-info {
      min-width: 0;
    }

    .birthday-avatar {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent-cyan);
      background: rgba(77, 163, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(77, 163, 255, 0.1), 0 8px 20px rgba(77, 163, 255, 0.28);
    }

    .birthday-avatar-stack {
      position: relative;
      justify-self: end;
      width: 110px;
      min-height: 70px;
      display: grid;
      grid-template-columns: 34px 62px;
      gap: 10px;
      align-items: center;
    }

    .birthday-status {
      position: static;
      justify-self: center;
      align-self: center;
      width: 70px;
      min-height: 22px;
      transform: rotate(90deg);
      transform-origin: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.66rem;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      box-shadow: 0 8px 18px rgba(3, 8, 24, 0.24);
    }

    .birthday-gender-female .birthday-avatar {
      border-color: #ff6b8a;
      background: rgba(255, 107, 138, 0.12);
      box-shadow: 0 0 0 4px rgba(255, 107, 138, 0.1), 0 8px 20px rgba(255, 107, 138, 0.25);
    }

    .bw-tick {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--ok);
      color: #fff;
      font-size: 0.65rem;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .birthday-wheel .timeline-item[data-employee] {
      cursor: pointer;
    }

    .birthday-wheel .timeline-item[data-employee]:hover .timeline-content {
      border-color: rgba(120, 191, 255, 0.46);
      background: rgba(20, 32, 78, 0.82);
    }

    .employee-detail-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 105;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(3, 8, 24, 0.72);
      backdrop-filter: blur(12px);
    }

    .employee-detail-modal-overlay.hidden {
      display: none;
    }

    .employee-detail-modal {
      width: min(94vw, 1040px);
      max-height: 92vh;
      overflow-y: auto;
      border-radius: var(--radius-xl);
      border: var(--border-soft);
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, 0.14), transparent 34%),
        linear-gradient(145deg, rgba(10, 18, 50, 0.98), rgba(6, 12, 34, 0.98));
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    .employee-detail-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .employee-detail-modal-title {
      margin: 0;
      font-size: 1.2rem;
    }

    .dashboard-detail-layout {
      display: grid;
      grid-template-columns: minmax(220px, 320px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .dashboard-profile-card {
      border: 1px solid rgba(110, 133, 227, 0.26);
      border-radius: var(--radius-xl);
      padding: 20px;
      text-align: center;
      background: rgba(11, 18, 48, 0.74);
    }

    .dashboard-detail-avatar {
      width: min(260px, 100%);
      aspect-ratio: 1;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent-blue);
      background: rgba(77, 163, 255, 0.12);
      box-shadow: 0 0 0 8px rgba(77, 163, 255, 0.08), 0 16px 34px rgba(77, 163, 255, 0.22);
    }

    .dashboard-profile-card h3 {
      margin: 14px 0 6px;
      font-size: 1.05rem;
    }

    .dashboard-profile-card p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .dashboard-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .dashboard-info-grid .info-item {
      min-width: 0;
      border: 1px solid rgba(110, 133, 227, 0.22);
      border-radius: 14px;
      background: rgba(11, 18, 48, 0.58);
      padding: 12px 14px;
    }

    .dashboard-info-grid small {
      display: block;
      color: var(--text-secondary);
      font-size: 0.74rem;
      margin-bottom: 5px;
    }

    .dashboard-info-grid strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .dashboard-search-modal {
      width: min(96vw, 1120px);
    }

    .dashboard-search-table-wrap {
      max-height: min(62vh, 620px);
      overflow: auto;
      border: 1px solid rgba(110, 133, 227, 0.22);
      border-radius: 16px;
      background: rgba(6, 12, 34, 0.26);
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 145, 255, 0.42) rgba(90, 104, 156, 0.16);
    }

    .dashboard-search-table-wrap table {
      min-width: 820px;
    }

    .dashboard-search-table-wrap tbody tr[data-employee] {
      cursor: pointer;
      animation: fadeUp 0.2s ease both;
      transition: background var(--transition);
    }

    .dashboard-search-table-wrap tbody tr[data-employee]:hover {
      background: rgba(77, 163, 255, 0.08);
    }

    .dashboard-search-table-wrap mark {
      border-radius: 5px;
      padding: 0 2px;
      color: #061026;
      background: #ffdf7a;
    }

    @media (max-width: 860px) {
      .employee-detail-modal-overlay {
        padding: 14px;
      }

      .employee-detail-modal {
        padding: 18px;
      }

      .dashboard-detail-layout,
      .dashboard-info-grid {
        grid-template-columns: 1fr;
      }
    }

         TREND MODAL
      ============================== */
    .trend-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(4, 8, 26, 0.82);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .trend-modal {
      width: min(96vw, 1320px);
      max-height: 94vh;
      overflow-y: auto;
      background: linear-gradient(160deg, rgba(17,27,67,0.97), rgba(11,18,48,0.99));
      border: var(--border-soft);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 32px 36px;
    }

    .trend-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .trend-modal-title {
      margin: 0;
      font-size: 1.35rem;
    }

    .trend-modal-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .trend-year-select {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(120,145,255,0.36);
      background: rgba(10,18,50,0.8);
      color: var(--text-primary);
      font-size: 0.98rem;
      cursor: pointer;
    }

    .trend-modal-close {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(120,145,255,0.3);
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.08rem;
      display: grid;
      place-items: center;
      transition: background var(--transition);
    }

    .trend-modal-close:hover { background: rgba(255,107,138,0.18); color: #ff9bb1; }

    .trend-modal-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      font-size: 0.92rem;
    }

    .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* Auth field disabled state */
    .auth-field input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: rgba(120,145,255,0.16);
    }
  </style>
</head>

        var emailStarted = email.length > 0;
        var secretStarted = secretCode.length > 0;

          && emailValid
          && secretStarted

          && captchaAnswer.length > 0;
        var canLogin = otpModeActive && emailValid && secretStarted && isOtpComplete_();
        var showSend = canSendOtp || isSendingOtp;
        var showLogin = canLogin || isLoggingIn;

        setAuthStepVisible_('email', true);
        setAuthStepVisible_('secret', emailStarted);
        setAuthStepVisible_('captcha', emailStarted && secretStarted && !otpModeActive);
        setAuthStepVisible_('captcha-answer', emailStarted && secretStarted && !otpModeActive);
        setAuthStepVisible_('otp', otpModeActive);

        if (sendOtpBtn) sendOtpBtn.classList.toggle('hidden', !showSend);
        if (loginBtn) loginBtn.classList.toggle('hidden', !showLogin);

      function primeAppsScriptConnections_() {

          link.crossOrigin = 'anonymous';

      function scheduleCaptchaWarmup_(delayMs) {

          captchaWarmupTimerId = null;
        }

          captchaWarmupTimerId = null;
          if (currentCaptchaId || captchaLoadPromise) return;
          if (authScreen && authScreen.classList.contains('hidden')) return;
          refreshCaptcha_({
            silent: true,
            maxAttempts: 4,
            timeoutMs: 12000,
            retryDelayMs: 500,
            nextDelayMs: 1800
          }).catch(function () {
            return null;
          });

      }

      function nudgeCaptchaWarmup_() {
        primeAppsScriptConnections_();
        if (currentCaptchaId || captchaLoadPromise) return;
        scheduleCaptchaWarmup_(0);
      }

      function bindCaptchaWarmupEvents_(input) {
        if (!input) return;
        input.addEventListener('focus', nudgeCaptchaWarmup_);
        input.addEventListener('input', nudgeCaptchaWarmup_);
        input.addEventListener('touchstart', nudgeCaptchaWarmup_, { passive: true });

      function setAuthConfigState_(config) {

        if (authConfigReady) {
          setConfigNotice_('');
        } else if (!missingKeys.length) {

            message || 'Không thể tải cấu hình đăng nhập từ Apps Script. Vui lòng tải lại hoặc thử lại sau.'

          );

      function setMessage_(text, tone) {
        if (!authMessage) return;
        authMessage.textContent = text || '';
        authMessage.classList.remove('is-error', 'is-success');
        if (tone) {
          authMessage.classList.add(tone === 'success' ? 'is-success' : 'is-error');
        }
      }

      function setButtonLoading_(button, isLoading) {
        if (button === sendOtpBtn) {
          isSendingOtp = !!isLoading;
        }
        if (button === loginBtn) {
          isLoggingIn = !!isLoading;
        }
        renderActionState_();
      }

      function toggleOtpMode_(isOtpActive, expiresAt) {
        otpModeActive = !!isOtpActive;

        }

      }

      function stopCountdown_() {

          countdownTimerId = null;
        }
        if (otpCountdown) {
          otpCountdown.textContent = 'OTP còn hiệu lực: 00:00';
        }
      }

      function formatCountdown_(ms) {
        var totalSeconds = Math.max(0, Math.floor(ms / 1000));
        var minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        var seconds = String(totalSeconds % 60).padStart(2, '0');
        return minutes + ':' + seconds;
      }

      function clearPendingOtp_() {
        try {
          window.localStorage.removeItem(PENDING_OTP_KEY);
        } catch (error) {}
        if (otpInput) otpInput.value = '';
        if (emailInput) emailInput.disabled = false;
        toggleOtpMode_(false);
      }

      function startCountdown_(expiresAt) {
        stopCountdown_();

        function renderCountdown() {
          var remainingMs = Number(expiresAt || 0) - Date.now();
          if (remainingMs <= 0) {
            clearPendingOtp_();
            setMessage_('OTP đã hết hạn. Vui lòng gửi lại mã mới.', 'error');
            currentCaptchaId = '';
            scheduleCaptchaWarmup_(0);
            return;
          }
          if (otpCountdown) {
            otpCountdown.textContent = 'OTP còn hiệu lực: ' + formatCountdown_(remainingMs);
          }
        }

        renderCountdown();
        countdownTimerId = window.setInterval(renderCountdown, 1000);
      }

      function savePendingOtp_(email, expiresAt) {
        try {
          window.localStorage.setItem(PENDING_OTP_KEY, JSON.stringify({
            email: email,
            expiresAt: expiresAt
          }));
        } catch (error) {}
      }

      function restorePendingOtp_() {
        try {
          var raw = window.localStorage.getItem(PENDING_OTP_KEY);
          if (!raw) {
            toggleOtpMode_(false);
            return;
          }

          var parsed = JSON.parse(raw);
          if (!parsed || Number(parsed.expiresAt) <= Date.now()) {
            clearPendingOtp_();
            return;
          }

          if (emailInput && parsed.email) {
            emailInput.value = parsed.email;
          }
          toggleOtpMode_(true, Number(parsed.expiresAt));
        } catch (error) {
          clearPendingOtp_();
        }
      }

      function persistSession_(sessionToken, user) {
        currentUser = user || null;

          window.localStorage.setItem(USER_KEY, JSON.stringify(currentUser || null));
        } catch (error) {}
      }

      function clearSession_() {
        currentUser = null;
        try {
          window.localStorage.removeItem(TOKEN_KEY);
          window.localStorage.removeItem(USER_KEY);
        } catch (error) {}
      }

      function getSessionToken_() {
        try {
          return window.localStorage.getItem(TOKEN_KEY) || '';
        } catch (error) {
          return '';
        }
      }

      function getDeviceInfo_() {
        return {
          userAgent: navigator.userAgent || '',
          platform: navigator.platform || '',
          language: navigator.language || '',
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
          screen: window.screen ? [window.screen.width, window.screen.height].join('x') : '',
          colorDepth: window.screen && window.screen.colorDepth ? String(window.screen.colorDepth) : '',
          hardwareConcurrency: navigator.hardwareConcurrency || '',
          deviceMemory: navigator.deviceMemory || '',
          touch: navigator.maxTouchPoints > 0

      }

      function isValidEmail_(value) {

      function refreshCaptcha_(options) {

          var isTransportError = isAppsScriptTransportError_(error);
          var message = isTransportError
            ? 'Không thể tải captcha vì Web App Apps Script chưa mở quyền truy cập công khai (Anyone, even anonymous) hoặc đang bị Google Workspace chặn. Vui lòng redeploy Apps Script với quyền công khai rồi thử lại.'
            : (error && error.message ? error.message : 'Không thể tải captcha.');

      function resetLoginFields_() {

        if (otpInput) otpInput.value = '';
        if (captchaAnswerInput) captchaAnswerInput.value = '';
      }

      function showLogin_() {
        if (appAuthenticated) return;
        if (authScreen) authScreen.classList.remove('hidden');
        if (sidebar) sidebar.classList.add('hidden');
        if (appMain) appMain.classList.add('hidden');
      }

      function showApp_(user) {
        appAuthenticated = true;
        currentUser = user || getStoredUser_();
        if (authScreen) authScreen.classList.add('hidden');
        if (sidebar) sidebar.classList.remove('hidden');
        if (appMain) appMain.classList.remove('hidden');

        }

      function finalizeSignedOutState_(message, tone) {

        isSigningOut = false;
        ownerSessionExchangePromise = null;
        clearSession_();
        clearPendingOtp_();

        return Promise.resolve().finally(function () {

          }
        });
      }

      function handleOtpRequest_() {
        var email = String(emailInput && emailInput.value || '').trim().toLowerCase();
        var secretCode = String(secretInput && secretInput.value || '').trim();
        var captchaAnswer = String(captchaAnswerInput && captchaAnswerInput.value || '').trim();

        if (!isValidEmail_(email)) {
          setMessage_('Email không đúng định dạng.', 'error');
          return;
        }

        if (!secretCode) {
          setMessage_('Vui lòng nhập mã bí mật.', 'error');
          return;
        }

        if (!currentCaptchaId) {
          setMessage_('');
          setButtonLoading_(sendOtpBtn, true);
          ensureCaptchaReady_({
            force: true,
            silent: false,
            maxAttempts: 5,
            timeoutMs: 12000,
            retryDelayMs: 500
          }).catch(function () {
            return false;
          }).then(function (ready) {
            if (ready) {
              setMessage_('Captcha đã sẵn sàng. Vui lòng nhập kết quả rồi gửi lại OTP.', 'error');
              if (captchaAnswerInput) {
                captchaAnswerInput.focus();
              }
              return;
            }
            setMessage_('Không thể tải captcha vì Web App Apps Script chưa public hoặc đang bị Google Workspace chặn anonymous access.', 'error');
          }).finally(function () {
            setButtonLoading_(sendOtpBtn, false);
          });
          return;
        }

        if (!captchaAnswer) {
          setMessage_('Vui lòng hoàn thành captcha.', 'error');
          return;
        }

        setMessage_('');
        setButtonLoading_(sendOtpBtn, true);

        API.call('requestOtp', {
          email: email,
          secretCode: secretCode,
          captchaId: currentCaptchaId,
          captchaAnswer: captchaAnswer,
          device: getDeviceInfo_()
        }).then(function (res) {
          var expiresAt = Number(res && res.otpExpiresAt || 0);
          savePendingOtp_(email, expiresAt);
          toggleOtpMode_(true, expiresAt);
          if (emailInput) emailInput.disabled = true;
          if (otpInput) otpInput.focus();
          if (captchaAnswerInput) captchaAnswerInput.value = '';
          setMessage_(res && res.message ? res.message : 'Đã gửi OTP thành công.', 'success');
        }).catch(function (error) {
          var payload = error && error.payload ? error.payload : {};
          if (payload && payload.code === 'AUTH_SETUP_INCOMPLETE') {
            setAuthConfigState_({ configReady: false, missingKeys: payload.missingKeys || [] });
          }
          if (payload && payload.lockedUntil) {
            setMessage_('Thiết bị đang tạm khóa đến ' + new Date(payload.lockedUntil).toLocaleString('vi-VN') + '.', 'error');
          } else {
            setMessage_(error && error.message ? error.message : 'Không thể gửi OTP.', 'error');
          }
          if (payload && (payload.refreshCaptcha || payload.code === 'AUTH_SETUP_INCOMPLETE')) {
            refreshCaptcha_({ force: true, silent: false, maxAttempts: 4, timeoutMs: 12000, retryDelayMs: 500 }).catch(function () {
              return null;
            });
          }
        }).finally(function () {
          setButtonLoading_(sendOtpBtn, false);
        });
      }

      function handleLogin_() {
        var email = String(emailInput && emailInput.value || '').trim().toLowerCase();
        var secretCode = String(secretInput && secretInput.value || '').trim();
        var otpCode = String(otpInput && otpInput.value || '').trim();

        if (!isValidEmail_(email)) {
          setMessage_('Email không đúng định dạng.', 'error');
          return;
        }

        if (!secretCode) {
          setMessage_('Vui lòng nhập mã bí mật.', 'error');
          return;
        }

        if (!/^\d{6}$/.test(otpCode)) {
          setMessage_('OTP phải gồm 6 chữ số.', 'error');
          return;
        }

        setMessage_('');
        setButtonLoading_(loginBtn, true);

        API.call('login', {
          email: email,
          secretCode: secretCode,
          otpCode: otpCode,
          device: getDeviceInfo_()
        }).then(function (res) {
          persistSession_(String(res.sessionToken || ''), res.user || { email: email });
          clearPendingOtp_();
          if (otpInput) otpInput.value = '';
          setMessage_('');
          showApp_(res.user || { email: email });
        }).catch(function (error) {
          var payload = error && error.payload ? error.payload : {};
          if (payload && payload.code === 'AUTH_SETUP_INCOMPLETE') {
            setAuthConfigState_({ configReady: false, missingKeys: payload.missingKeys || [] });
          }
          if (payload && payload.refreshOtp) {
            clearPendingOtp_();
          }
          if (payload && payload.lockedUntil) {
            setMessage_('Thiết bị đang tạm khóa đến ' + new Date(payload.lockedUntil).toLocaleString('vi-VN') + '.', 'error');
          } else {
            setMessage_(error && error.message ? error.message : 'Đăng nhập thất bại.', 'error');
          }
        }).finally(function () {
          setButtonLoading_(loginBtn, false);
        });
      }

      function bindEvents_() {
        if (eventsBound) return;
        if (sendOtpBtn) sendOtpBtn.addEventListener('click', handleOtpRequest_);
        if (loginBtn) loginBtn.addEventListener('click', handleLogin_);
        [emailInput, secretInput, captchaAnswerInput, otpInput].forEach(function (input) {
          if (input) input.addEventListener('input', syncProgressiveLogin_);
        });
        bindCaptchaWarmupEvents_(emailInput);
        bindCaptchaWarmupEvents_(secretInput);
        bindCaptchaWarmupEvents_(captchaAnswerInput);
        if (refreshCaptchaBtn) {
          refreshCaptchaBtn.addEventListener('click', function () {
            setMessage_('');
            refreshCaptcha_({ force: true, silent: false, maxAttempts: 5, timeoutMs: 12000, retryDelayMs: 500 }).catch(function () {
              return null;
            });
          });
        }
        eventsBound = true;
      }

      function loadScriptOnce_(src) {
        if (scriptLoadPromises[src]) return scriptLoadPromises[src];
        scriptLoadPromises[src] = new Promise(function (resolve, reject) {

          function renderTrend(items, canvasId) {
            var cid = canvasId || 'trendChart';
            var canvas = document.getElementById(cid);
            if (!canvas || !canvas.getContext) return;
            // Đặt kích thước canvas theo container nếu chưa có attribute
            if (!canvas.hasAttribute('width') || canvas.width < 10) {
              var p = canvas.parentElement;
              canvas.width = p ? Math.max(p.clientWidth || 400, 200) : 400;
            }
            if (!canvas.hasAttribute('height') || canvas.height < 10) {
              canvas.height = Math.max(260, Math.round(canvas.width * 0.28));
            }
            var ctx = canvas.getContext('2d');

            // Giữ nguyên null — null = tháng tương lai (chưa có dữ liệu)
            var hirePoints   = (items || []).map(function(item) {
              return (item.count === null || item.count === undefined) ? null : Number(item.count);
            });
            var resignPoints = (items || []).map(function(item) {
              return (item.resignedCount === null || item.resignedCount === undefined) ? null : Number(item.resignedCount);
            });
            var labels = (items || []).map(function(item) { return item.label || ''; });

            var pad = { top: 18, right: 20, bottom: 28, left: 30 };
            var chartW = canvas.width - pad.left - pad.right;
            var chartH = canvas.height - pad.top - pad.bottom;
            var n = hirePoints.length;

            // maxVal chỉ tính từ giá trị thực (bỏ null)
            var allReal = hirePoints.concat(resignPoints).filter(function(v) { return v !== null; });
            var maxVal = allReal.length ? Math.max.apply(null, allReal.concat([1])) : 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!n) {
              ctx.font = '12px Inter, sans-serif'; ctx.fillStyle = '#93a5d8';
              ctx.fillText('Ch\u01b0a c\u00f3 d\u1eef li\u1ec7u.', 20, 40); return;
            }

            function xAt(i) {
              return n === 1 ? pad.left + chartW / 2 : pad.left + (chartW / (n - 1)) * i;
            }
            function yAt(v) { return pad.top + ((maxVal - v) / Math.max(1, maxVal)) * chartH; }

            // Hàm vẽ đường có xử lý null (break tại null, không nối qua tháng tương lai)
            function drawPolyline(points, stroke, lineWidth, fillGrad) {
              var i = 0;
              var inSegment = false;
              var lastValidI = -1;

              ctx.beginPath();
              for (i = 0; i < points.length; i++) {
                if (points[i] === null) {
                  inSegment = false;
                  continue;
                }
                if (!inSegment) {
                  ctx.moveTo(xAt(i), yAt(points[i]));
                  inSegment = true;
                } else {
                  // bezier để đường mượt
                  var cx = (xAt(i - 1) + xAt(i)) / 2;
                  // prev phải là non-null để bezier đúng
                  var prev = points[i - 1];
                  if (prev !== null) {
                    ctx.bezierCurveTo(cx, yAt(prev), cx, yAt(points[i]), xAt(i), yAt(points[i]));
                  } else {
                    ctx.moveTo(xAt(i), yAt(points[i]));
                  }
                }
                lastValidI = i;
              }
              ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke();

              // Area fill chỉ cho hire line
              if (fillGrad && lastValidI >= 0) {
                // Tìm đoạn liên tục cuối cùng để fill
                var segEnd = lastValidI;
                var segStart = segEnd;
                while (segStart > 0 && points[segStart - 1] !== null) segStart--;

                if (segEnd >= segStart && points[segStart] !== null) {
                  ctx.beginPath();
                  ctx.moveTo(xAt(segStart), yAt(points[segStart]));
                  for (var fi = segStart + 1; fi <= segEnd; fi++) {
                    if (points[fi] === null) break;
                    var fcx = (xAt(fi - 1) + xAt(fi)) / 2;
                    ctx.bezierCurveTo(fcx, yAt(points[fi-1]), fcx, yAt(points[fi]), xAt(fi), yAt(points[fi]));
                  }
                  ctx.lineTo(xAt(segEnd), canvas.height - pad.bottom);
                  ctx.lineTo(xAt(segStart), canvas.height - pad.bottom);
                  ctx.closePath();
                  ctx.fillStyle = fillGrad; ctx.fill();
                }
              }
            }

            // Grid lines
            ctx.strokeStyle = 'rgba(133,155,230,0.18)'; ctx.lineWidth = 1;
            for (var gi = 0; gi <= 4; gi++) {
              var gy = pad.top + (chartH / 4) * gi;
              ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(canvas.width - pad.right, gy); ctx.stroke();
            }

            // Y labels
            ctx.font = '10px Inter,sans-serif'; ctx.fillStyle = '#6a7fa8'; ctx.textAlign = 'right';
            for (var yi = 0; yi <= 4; yi++) {
              var yv = Math.round(maxVal - (maxVal / 4) * yi);
              ctx.fillText(yv, pad.left - 4, pad.top + (chartH / 4) * yi + 4);
            }
            ctx.textAlign = 'left';

            // Gradients
            var lineGrad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            lineGrad.addColorStop(0, '#4da3ff'); lineGrad.addColorStop(1, '#8b5cf6');
            var areaGrad = ctx.createLinearGradient(0, pad.top, 0, canvas.height);
            areaGrad.addColorStop(0, 'rgba(77,163,255,0.25)'); areaGrad.addColorStop(1, 'rgba(77,163,255,0.01)');

            // Vẽ đường hire (xanh) + area fill
            drawPolyline(hirePoints, lineGrad, 3, areaGrad);

            // Vẽ đường resign (đỏ) — chỉ nếu có giá trị thực
            var hasResigned = resignPoints.some(function(v) { return v !== null && v > 0; });
            if (hasResigned) {
              drawPolyline(resignPoints, '#ff6b8a', 2.5, null);
            }

            // X labels — tất cả tháng (kể cả tương lai, nhưng nhạt hơn)
            ctx.font = '11px Inter,sans-serif'; ctx.textAlign = 'center';
            labels.forEach(function(lbl, li) {
              ctx.fillStyle = hirePoints[li] === null ? 'rgba(147,165,216,0.38)' : '#93a5d8';
              ctx.fillText(lbl, xAt(li), canvas.height - 9);
            });

            // Resign dots + số liệu (đỏ) — vẽ trước để hire đè lên
            if (hasResigned) {
              resignPoints.forEach(function(v, ri) {
                if (v === null) return;
                // Dot
                ctx.beginPath(); ctx.arc(xAt(ri), yAt(v), 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6b8a'; ctx.fill();
                // Số — hiển thị phía dưới dot để không đè lên hire
                ctx.font = 'bold 10px Inter,sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff6b8a';
                ctx.fillText(String(v), xAt(ri), yAt(v) + 14);
              });
            }

            // Hire dots + số liệu (xanh) — chỉ tháng có dữ liệu thực
            hirePoints.forEach(function(v, pi) {
              if (v === null) return;
              // Dot
              ctx.beginPath(); ctx.arc(xAt(pi), yAt(v), 4, 0, Math.PI * 2);
              ctx.fillStyle = '#8fd2ff'; ctx.fill();
              ctx.beginPath(); ctx.arc(xAt(pi), yAt(v), 2, 0, Math.PI * 2);
              ctx.fillStyle = '#fff'; ctx.fill();
              // Số — hiển thị phía trên dot
              ctx.font = 'bold 10px Inter,sans-serif';
              ctx.textAlign = 'center';
              // Nền nhỏ để dễ đọc khi overlap đường
              var label = String(v);
              var lw = ctx.measureText(label).width;
              ctx.fillStyle = 'rgba(11,18,48,0.72)';
              ctx.fillRect(xAt(pi) - lw / 2 - 2, yAt(v) - 16, lw + 4, 13);
              ctx.fillStyle = '#a8d8ff';
              ctx.fillText(label, xAt(pi), yAt(v) - 5);
            });
          }

            ];

          function renderSafetyIncidentChart(items, canvasId) {
            var canvas = document.getElementById(canvasId || 'safetyIncidentChart');
            if (!canvas || !canvas.getContext) return;

            var parent = canvas.parentElement;
            canvas.width = parent ? Math.max(parent.clientWidth || 420, 240) : 420;
            canvas.height = canvas.width < 360 ? 220 : 200;
            canvas.style.height = canvas.height + 'px';

            var ctx = canvas.getContext('2d');
            var data = (items || []).map(function(item) {
              var normalized = {
                label: item.label || '',
                minor: Number(item.minor) || 0,
                medium: Number(item.medium) || 0,
                severe: Number(item.severe) || 0,
                leave: Number(item.leave) || 0,
                daysLost: Number(item.daysLost) || 0
              };
              normalized.total = Number(item.total) || normalized.minor + normalized.medium + normalized.severe + normalized.leave;
              return normalized;
            });
            var labels = data.map(function(item) { return item.label; });
            var series = [
              { key: 'minor', label: 'Nhẹ', color: '#22c55e' },
              { key: 'medium', label: 'Trung bình', color: '#facc15' },
              { key: 'severe', label: 'Nặng', color: '#ef4444' },
              { key: 'leave', label: 'Nghỉ điều trị/nghỉ việc', color: '#a78bfa' }
            ];
            var totalMax = Math.max.apply(null, data.map(function(item) { return item.total; }).concat([1]));
            var daysMax = Math.max.apply(null, data.map(function(item) { return item.daysLost; }).concat([1]));
            var maxVal = Math.max(1, totalMax);
            var pad = { top: 28, right: 32, bottom: 34, left: 30 };
            var chartW = canvas.width - pad.left - pad.right;
            var chartH = canvas.height - pad.top - pad.bottom;
            var n = labels.length;
            var hitAreas = [];

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!n) return;

            function yAt(v) {
              return pad.top + chartH - (Number(v) / maxVal) * chartH;
            }

            function daysYAt(v) {
              return pad.top + chartH - (Number(v) / Math.max(1, daysMax)) * chartH;
            }

            function centerX(index) {
              return pad.left + (chartW / n) * index + (chartW / n) / 2;
            }

            function formatTooltip(item) {
              return '<strong>' + escapeHtml(item.label) + '</strong>' +
                '<div><span>Nhẹ</span><b>' + item.minor + '</b></div>' +
                '<div><span>Trung bình</span><b>' + item.medium + '</b></div>' +
                '<div><span>Nặng</span><b>' + item.severe + '</b></div>' +
                '<div><span>Nghỉ điều trị/nghỉ việc</span><b>' + item.leave + '</b></div>' +
                '<div><span>Tổng số vụ</span><b>' + item.total + '</b></div>' +
                '<div><span>Ngày nghỉ</span><b>' + item.daysLost + '</b></div>';
            }

            function ensureChartLegend() {
              var legendId = canvas.id + 'Legend';
              var legend = document.getElementById(legendId);
              if (!legend) {
                legend = document.createElement('div');
                legend.id = legendId;
                legend.className = 'chart-legend';
                canvas.insertAdjacentElement('afterend', legend);
              }
              legend.innerHTML = series.map(function(item) {
                return '<span class="chart-legend-item"><i class="chart-legend-dot" style="background:' + item.color + '"></i>' + escapeHtml(item.label) + '</span>';
              }).join('') +
                '<span class="chart-legend-item"><i class="chart-legend-dot" style="background:#38bdf8"></i>Đường: ngày nghỉ</span>';
            }

            function ensureChartTooltip() {
              var tooltipId = canvas.id + 'Tooltip';
              var tooltip = document.getElementById(tooltipId);
              if (!tooltip) {
                tooltip = document.createElement('div');
                tooltip.id = tooltipId;
                tooltip.className = 'chart-tooltip';
                parent.appendChild(tooltip);
              }
              return tooltip;
            }

            function drawDaysLine() {
              var points = data.map(function(item, index) {
                return { x: centerX(index), y: daysYAt(item.daysLost), value: item.daysLost };
              });
              if (!points.length) return;
              ctx.beginPath();
              points.forEach(function(point, index) {
                if (index === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
              });
              ctx.strokeStyle = '#38bdf8';
              ctx.lineWidth = 2.4;
              ctx.lineJoin = 'round';
              ctx.lineCap = 'round';
              ctx.stroke();
              points.forEach(function(point) {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 3.2, 0, Math.PI * 2);
                ctx.fillStyle = '#38bdf8';
                ctx.fill();
              });
            }

            ctx.strokeStyle = 'rgba(133,155,230,0.18)';
            ctx.lineWidth = 1;
            for (var gi = 0; gi <= 4; gi += 1) {
              var gy = pad.top + (chartH / 4) * gi;
              ctx.beginPath();
              ctx.moveTo(pad.left, gy);
              ctx.lineTo(canvas.width - pad.right, gy);
              ctx.stroke();
            }

            ctx.fillStyle = '#93a5d8';
            ctx.font = '10px Inter,sans-serif';
            ctx.textAlign = 'right';
            for (var yi = 0; yi <= 2; yi += 1) {
              var yv = Math.round((maxVal / 2) * yi);
              ctx.fillText(String(yv), pad.left - 6, yAt(yv) + 3);
            }

            data.forEach(function(item, index) {
              var slotW = chartW / n;
              var barW = Math.max(18, Math.min(42, slotW * 0.48));
              var x = centerX(index) - barW / 2;
              var bottom = pad.top + chartH;
              var cursorY = bottom;

              series.forEach(function(def) {
                var value = Number(item[def.key]) || 0;
                if (!value) return;
                var segmentH = (value / maxVal) * chartH;
                cursorY -= segmentH;
                ctx.fillStyle = def.color;
                ctx.fillRect(x, cursorY, barW, Math.max(1, segmentH));
              });

              ctx.fillStyle = '#f8fafc';
              ctx.font = 'bold 11px Inter,sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(String(item.total), centerX(index), Math.max(14, yAt(item.total) - 8));

              ctx.fillStyle = '#93a5d8';
              ctx.font = '11px Inter,sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(item.label, centerX(index), canvas.height - 12);

              hitAreas.push({
                item: item,
                x1: centerX(index) - Math.max(barW / 2, slotW * 0.34),
                x2: centerX(index) + Math.max(barW / 2, slotW * 0.34),
                y1: pad.top,
                y2: bottom
              });
            });

            drawDaysLine();
            ensureChartLegend();

            var tooltip = ensureChartTooltip();
            canvas.onmousemove = function(event) {
              var rect = canvas.getBoundingClientRect();
              var x = event.clientX - rect.left;
              var y = event.clientY - rect.top;
              var hit = hitAreas.find(function(area) {
                return x >= area.x1 && x <= area.x2 && y >= area.y1 && y <= area.y2;
              });
              if (!hit) {
                tooltip.classList.remove('is-visible');
                return;
              }
              tooltip.innerHTML = formatTooltip(hit.item);
              tooltip.style.left = Math.max(86, Math.min(parent.clientWidth - 86, x)) + 'px';
              tooltip.style.top = Math.max(58, y + 6) + 'px';
              tooltip.classList.add('is-visible');
            };
            canvas.onmouseleave = function() {
              tooltip.classList.remove('is-visible');
            };
          }

          function renderUpcomingBirthdays(items) {

              return;
            }
            var nearestBirthday = items.find(function(item) { return Number(item.daysAway) >= 0; }) || items[0];
            var nearestBirthdayKey = getEmployeeKey(nearestBirthday);

            function renderBirthdayItem(item) {
              var tick = (item.isToday || item.isUpcoming) ? '<span class="bw-tick">\u2713</span>' : '';
              var genderKey = getGenderKey(item.gioiTinh);

              var statusBadge = '<span class="birthday-status ' + buildStatusClass(item.statusTone) + '" title="' + escapeHtml(statusText) + '">' + escapeHtml(statusText) + '</span>';
              if (employeeKey && employeeKey === nearestBirthdayKey) cls += ' bw-nearest';
              return '<div class="' + cls + '" data-employee="' + escapeHtml(employeeKey) + '" role="button" tabindex="0" aria-label="Xem chi tiết ' + escapeHtml(item.ten || 'nhân sự') + '">' +
                '<div class="timeline-date">' + escapeHtml(item.dayLabel || '--') + '</div>' +
                '<div class="timeline-content birthday-person-card">' +
                  '<div class="birthday-person-info">' +
                    '<strong>' + escapeHtml(item.ten || '') + tick + '</strong>' +
                    '<div class="muted">' + escapeHtml(item.boPhan || '') + ' \u2022 ' + escapeHtml(item.dateLabel || '') + '</div>' +
                    '<div class="muted">' + escapeHtml(item.relativeLabel || '') + '</div>' +
                  '</div>' +
                  '<div class="birthday-avatar-stack">' +
                    statusBadge +
                    '<img class="birthday-avatar" src="' + escapeHtml(avatarUrl) + '" alt="Ảnh ' + escapeHtml(item.ten || 'nhân sự') + '" loading="lazy" />' +
                  '</div>' +
                '</div>' +
              '</div>';
            }

            var loopItems = items.length > 1 ? items.concat(items, items) : items;
            container.innerHTML = loopItems.map(renderBirthdayItem).join('');

            // Hàm cuộn về phần tử sắp tới gần nhất
            function getLoopSegmentHeight() {
              return items.length > 1 ? container.scrollHeight / 3 : 0;
            }

            function normalizeLoopScroll() {
              var segment = getLoopSegmentHeight();
              if (!segment) return;
              if (container.scrollTop < segment * 0.55) {
                container.scrollTop += segment;
              } else if (container.scrollTop > segment * 1.55) {
                container.scrollTop -= segment;
              }
            }

            function scrollToUpcoming(behavior) {
              var candidates = container.querySelectorAll('.bw-nearest');
              var target = candidates.length > 1 ? candidates[Math.floor(candidates.length / 2)] : (candidates[0] || null);
              if (target) {
                var wrap = container.parentElement;
                var wrapH = wrap ? wrap.clientHeight : container.clientHeight;
                var targetTop = target.offsetTop;
                var targetH = target.offsetHeight;
                container.scrollTo({ top: targetTop - (wrapH / 2) + (targetH / 2), behavior: behavior || 'auto' });
              }
            }

            function getUpcomingTargetTop() {
              var candidates = container.querySelectorAll('.bw-nearest');
              var target = candidates.length > 1 ? candidates[Math.floor(candidates.length / 2)] : (candidates[0] || null);
              if (!target) return null;
              var wrap = container.parentElement;
              var wrapH = wrap ? wrap.clientHeight : container.clientHeight;
              return target.offsetTop - (wrapH / 2) + (target.offsetHeight / 2);
            }

            var returnTimerId = null;
            var returnRafId = null;

            function cancelBirthdayReturn() {
              if (returnTimerId) {
                window.clearTimeout(returnTimerId);
                returnTimerId = null;
              }
              if (returnRafId) {
                window.cancelAnimationFrame(returnRafId);
                returnRafId = null;
              }
            }

            function easeOutCubic(value) {
              return 1 - Math.pow(1 - value, 3);
            }

            function rollToUpcomingWithBounce() {
              cancelBirthdayReturn();
              var targetTop = getUpcomingTargetTop();
              if (targetTop === null) return;
              var startTop = container.scrollTop;
              var duration = 2800;
              var startTime = 0;

              function step(timestamp) {
                if (!startTime) startTime = timestamp;
                var progress = Math.min((timestamp - startTime) / duration, 1);
                var settlePoint = 0.62;
                var top;
                if (progress <= settlePoint) {
                  top = startTop + (targetTop - startTop) * easeOutCubic(progress / settlePoint);
                } else {
                  var bounce = (progress - settlePoint) / (1 - settlePoint);
                  top = targetTop + Math.sin(bounce * Math.PI * 5) * (1 - bounce) * 24;
                }
                container.scrollTop = top;
                applyWheelFocus();
                if (progress < 1) {
                  returnRafId = window.requestAnimationFrame(step);
                } else {
                  container.scrollTop = targetTop;
                  applyWheelFocus();
                  returnRafId = null;
                }
              }

              returnRafId = window.requestAnimationFrame(step);
            }

            function scheduleBirthdayReturn() {
              cancelBirthdayReturn();
              returnTimerId = window.setTimeout(function() {
                returnTimerId = null;
                rollToUpcomingWithBounce();
              }, 3000);
            }

            // Scroll ban đầu
            setTimeout(function() { scrollToUpcoming('auto'); applyWheelFocus(); }, 150);
            setTimeout(function() { scrollToUpcoming('auto'); applyWheelFocus(); }, 450);

            function openBirthdayEmployeeFromEvent(event) {
              var row = event.target && event.target.closest
                ? event.target.closest('.timeline-item[data-employee]')
                : null;
              if (!row || !container.contains(row)) return;
              openBirthdayEmployeeByKey(row.getAttribute('data-employee'));
            }

            if (!container._birthdayDetailBound) {
              container._birthdayDetailBound = true;
              var isDragging = false;
              var dragStartY = 0;
              var dragStartScroll = 0;
              var didDrag = false;
              var pointerDownEmployeeKey = '';

              container.addEventListener('pointerdown', function(event) {
                if (event.button !== 0) return;
                cancelBirthdayReturn();
                var row = event.target && event.target.closest
                  ? event.target.closest('.timeline-item[data-employee]')
                  : null;
                isDragging = true;
                didDrag = false;
                pointerDownEmployeeKey = row && container.contains(row) ? row.getAttribute('data-employee') : '';
                dragStartY = event.clientY;
                dragStartScroll = container.scrollTop;
                container.classList.add('is-dragging');
                container.setPointerCapture(event.pointerId);
              });

              container.addEventListener('pointermove', function(event) {
                if (!isDragging) return;
                var delta = event.clientY - dragStartY;
                if (Math.abs(delta) > 4) didDrag = true;
                container.scrollTop = dragStartScroll - delta;
                normalizeLoopScroll();
                event.preventDefault();
              });

              container.addEventListener('wheel', cancelBirthdayReturn, { passive: true });
              container.addEventListener('mouseenter', cancelBirthdayReturn);

              function endDrag(event) {
                if (!isDragging) return;
                isDragging = false;
                container.classList.remove('is-dragging');
                if (container.hasPointerCapture && container.hasPointerCapture(event.pointerId)) {
                  container.releasePointerCapture(event.pointerId);
                }
                if (!didDrag && pointerDownEmployeeKey) {
                  openBirthdayEmployeeByKey(pointerDownEmployeeKey);
                  didDrag = true;
                }
                pointerDownEmployeeKey = '';
              }

              container.addEventListener('pointerup', endDrag);
              container.addEventListener('pointercancel', endDrag);

              container.addEventListener('click', function(event) {
                if (didDrag) {
                  event.preventDefault();
                  didDrag = false;
                  return;
                }
                openBirthdayEmployeeFromEvent(event);
              });
              container.addEventListener('keydown', function(event) {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                openBirthdayEmployeeFromEvent(event);
              });
            }

            var panel = container.closest('.card.panel');
            if (panel && !panel._bwMouseLeave) {
              panel._bwMouseLeave = true;
              panel.addEventListener('mouseenter', cancelBirthdayReturn);
              panel.addEventListener('mouseleave', function() {
                scheduleBirthdayReturn();
              });
            }

            // Hiệu ứng opacity wheel khi cuộn
            function applyWheelFocus() {
              normalizeLoopScroll();
              var wrap = container.parentElement;
              var wrapRect = wrap ? wrap.getBoundingClientRect() : container.getBoundingClientRect();
              var centerY = wrapRect.top + wrapRect.height / 2;
              var allItems = container.querySelectorAll('.timeline-item');
              allItems.forEach(function(el) {
                var r = el.getBoundingClientRect();
                var itemCenter = r.top + r.height / 2;
                var dist = Math.abs(centerY - itemCenter);
                var maxDist = wrapRect.height / 2;
                var norm = Math.min(dist / Math.max(maxDist, 1), 1);
                el.style.opacity = (1 - norm * 0.72).toFixed(3);
                el.style.transform = 'scale(' + (1 - norm * 0.05).toFixed(3) + ')';
              });
            }
            container.addEventListener('scroll', applyWheelFocus, { passive: true });
            window.addEventListener('resize', applyWheelFocus, { passive: true });
            setTimeout(applyWheelFocus, 200);
          }
