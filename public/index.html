          function escapeHtml(text) {
            return String(text == null ? '' : text)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#039;');
          }

          function pad2(value) {
            return String(value).padStart(2, '0');
          }

          function toMonthKey(dateText) {
            return String(dateText || '').slice(0, 7);
          }

          function monthLabel(monthKey) {
            var parts = String(monthKey || '').split('-');
            return parts.length === 2 ? 'T' + pad2(parts[1]) : '--';
          }

          function fullMonthLabel(monthKey) {
            var parts = String(monthKey || '').split('-');
            return parts.length === 2 ? 'Tháng ' + Number(parts[1]) + '/' + parts[0] : '--';
          }

          function formatDate(dateText) {
            if (!dateText) return '--';
            var parts = String(dateText).split('-');
            return parts.length === 3 ? parts[2] + '/' + parts[1] + '/' + parts[0] : dateText;
          }

          function addMonths(date, offset) {
            return new Date(date.getFullYear(), date.getMonth() + offset, 1);
          }

          function buildRecentMonthKeys(count) {
            var now = new Date();
            var output = [];
            for (var i = count - 1; i >= 0; i -= 1) {
              var date = addMonths(now, -i);
              output.push(date.getFullYear() + '-' + pad2(date.getMonth() + 1));
            }
            return output;
          }

          function buildMonthKeysBetween(fromMonth, toMonth) {
            if (!fromMonth || !toMonth || fromMonth > toMonth) return buildRecentMonthKeys(6);
            var startParts = fromMonth.split('-');
            var endParts = toMonth.split('-');
            var cursor = new Date(Number(startParts[0]), Number(startParts[1]) - 1, 1);
            var end = new Date(Number(endParts[0]), Number(endParts[1]) - 1, 1);
            var output = [];
            while (cursor <= end && output.length < 24) {
              output.push(cursor.getFullYear() + '-' + pad2(cursor.getMonth() + 1));
              cursor = addMonths(cursor, 1);
            }
            return output.length ? output : buildRecentMonthKeys(6);
          }

          function dateInMonth(monthKey, day) {
            return monthKey + '-' + pad2(day);

            }).join('');
            select.innerHTML = html;

          function getSelectedFilters() {
            return {
              from: els.filters.from ? els.filters.from.value : '',
              to: els.filters.to ? els.filters.to.value : '',
              process: els.filters.process ? els.filters.process.value : 'all',
              severity: els.filters.severity ? els.filters.severity.value : 'all',
              team: els.filters.team ? els.filters.team.value : 'all',
              shift: els.filters.shift ? els.filters.shift.value : 'all',
              status: els.filters.status ? els.filters.status.value : 'all'
            };
          }

          function recordMatchesFilters(record, filters) {
            var month = toMonthKey(record.date);
            if (filters.from && month < filters.from) return false;
            if (filters.to && month > filters.to) return false;
            if (filters.process !== 'all' && record.process !== filters.process) return false;
            if (filters.severity !== 'all' && record.severity !== filters.severity) return false;
            if (filters.team !== 'all' && record.team !== filters.team) return false;
            if (filters.shift !== 'all' && record.shift !== filters.shift) return false;
            if (filters.status !== 'all' && record.status !== filters.status) return false;
            return true;
          }

          function applyFilters() {
            var filters = getSelectedFilters();
            monthKeys = buildMonthKeysBetween(filters.from, filters.to);
            filteredRecords = records.filter(function(record) {
              return recordMatchesFilters(record, filters);
            });
            renderAll();
          }

          function applyTableFilters() {
            var search = els.tableFilters.search ? els.tableFilters.search.value.trim().toLowerCase() : '';
            var month = els.tableFilters.month ? els.tableFilters.month.value : 'all';
            var process = els.tableFilters.process ? els.tableFilters.process.value : 'all';
            var severity = els.tableFilters.severity ? els.tableFilters.severity.value : 'all';
            tableRecords = filteredRecords.filter(function(record) {
              var haystack = [
                record.id, record.date, record.person, record.department, record.process, record.description,
                record.rootCause, record.correctiveAction, record.owner, STATUS[record.status], SEVERITY[record.severity].label
              ].join(' ').toLowerCase();
              return (!search || haystack.indexOf(search) !== -1)
                && (month === 'all' || toMonthKey(record.date) === month)
                && (process === 'all' || record.process === process)
                && (severity === 'all' || record.severity === severity);
            });
            sortTableRecords();
            renderTable();
          }

          function compareValue(record, key) {
            if (key === 'month') return toMonthKey(record.date);
            if (key === 'severity') return SEVERITY[record.severity] ? SEVERITY[record.severity].rank : 0;
            if (key === 'lostTime') return LOST_TIME[record.lostTime] || '';
            if (key === 'permanentImpact') return PERMANENT_IMPACT[record.permanentImpact] || '';
            if (key === 'status') return STATUS[record.status] || '';
            return record[key] == null ? '' : record[key];
          }

          function sortTableRecords() {
            tableRecords.sort(function(a, b) {
              var av = compareValue(a, sortState.key);
              var bv = compareValue(b, sortState.key);
              if (typeof av === 'number' || typeof bv === 'number') {
                return (Number(av) - Number(bv)) * (sortState.dir === 'asc' ? 1 : -1);
              }
              return String(av).localeCompare(String(bv), 'vi') * (sortState.dir === 'asc' ? 1 : -1);
            });
          }

          function aggregateMonthly(items) {
            var map = {};
            monthKeys.forEach(function(month) {
              map[month] = {
                month: month,
                total: 0,
                nearMiss: 0,
                minor: 0,
                medical: 0,
                lti: 0,
                fatal: 0,
                lostManpower: 0,
                ltiCases: 0,
                restrictedWorkCases: 0,
                longTermAbsence: 0,
                score: 0
              };
            });
            items.forEach(function(record) {
              var month = toMonthKey(record.date);
              if (!map[month]) return;
              var bucket = map[month];
              bucket.total += 1;
              bucket[record.severity] += 1;
              bucket.lostManpower += Number(record.affectedPeople) || 0;
              bucket.ltiCases += isLostTimeInjury(record) ? 1 : 0;
              bucket.restrictedWorkCases += record.lostTime === 'restrictedWork' ? 1 : 0;
              bucket.longTermAbsence += record.longTermAbsence === 'yes' ? 1 : 0;
              bucket.score += SEVERITY[record.severity] ? SEVERITY[record.severity].score : 0;
            });
            return monthKeys.map(function(month) { return map[month]; });
          }

          function aggregateProcessHeatmap(items) {
            var map = {};
            PROCESS_OPTIONS.forEach(function(process) {
              map[process] = {};
              monthKeys.forEach(function(month) {
                map[process][month] = {
                  process: process,
                  month: month,
                  total: 0,
                  nearMiss: 0,
                  minor: 0,
                  medical: 0,
                  lti: 0,
                  fatal: 0,
                  score: 0
                };
              });
            });
            items.forEach(function(record) {
              var month = toMonthKey(record.date);
              if (!map[record.process] || !map[record.process][month]) return;
              var cell = map[record.process][month];
              cell.total += 1;
              cell[record.severity] += 1;
              cell.score += SEVERITY[record.severity] ? SEVERITY[record.severity].score : 0;
            });
            return map;
          }

          function isLostTimeInjury(record) {
            return record.severity === 'lti'
              || record.lostTime === 'lostTimeInjury'
              || record.lostTime === 'longTermAbsence'
              || record.lostTime === 'permanentLost';
          }

          function isPermanentDisability(record) {
            return record.permanentImpact === 'permanentPartialDisability'
              || record.permanentImpact === 'permanentTotalDisability';
          }

          function calculateKpis(items) {
            var total = items.length;
            var nearMiss = items.filter(function(record) { return record.severity === 'nearMiss'; }).length;
            var lti = items.filter(isLostTimeInjury).length;
            var fatality = items.filter(function(record) { return record.permanentImpact === 'fatality'; }).length;
            var permanentDisability = items.filter(isPermanentDisability).length;
            var lostManpower = items.reduce(function(sum, record) { return sum + (Number(record.affectedPeople) || 0); }, 0);
            var estimatedManHours = Math.max(1, monthKeys.length * 18000);
            var ltifr = (lti * 1000000 / estimatedManHours);
            return {
              total: total,
              nearMiss: nearMiss,
              lti: lti,
              fatality: fatality,
              permanentDisability: permanentDisability,
              ltifr: ltifr,
              lostManpower: lostManpower
            };
          }

          function calculateDelta(metricName) {
            if (!monthKeys.length) return { value: 0, text: 'Chưa có kỳ so sánh', tone: 'good' };
            var splitIndex = Math.max(1, Math.floor(monthKeys.length / 2));
            var previousMonths = monthKeys.slice(0, splitIndex);
            var currentMonths = monthKeys.slice(splitIndex);
            var previousItems = records.filter(function(record) { return previousMonths.indexOf(toMonthKey(record.date)) !== -1; });
            var currentItems = records.filter(function(record) { return currentMonths.indexOf(toMonthKey(record.date)) !== -1; });
            var previous = calculateKpis(previousItems)[metricName] || 0;
            var current = calculateKpis(currentItems)[metricName] || 0;
            var diff = current - previous;
            var tone = diff > 0 ? 'danger' : (diff < 0 ? 'good' : 'warn');
            return {
              value: diff,
              tone: tone,
              text: diff === 0 ? 'Không đổi so với kỳ trước' : (diff > 0 ? 'Tăng ' + formatMetric(diff, metricName) : 'Giảm ' + formatMetric(Math.abs(diff), metricName))
            };
          }

          function formatMetric(value, metricName) {
            if (metricName === 'ltifr') return Number(value).toFixed(2);
            return String(Math.round(Number(value) || 0));
          }

          function renderKpis() {
            if (!els.kpiGrid) return;
            var kpis = calculateKpis(filteredRecords);
            var configs = [
              { key: 'total', label: 'Tổng số vụ (Total Incidents)', value: formatMetric(kpis.total, 'total'), tone: kpis.total > 8 ? 'danger' : (kpis.total > 3 ? 'warn' : 'good') },
              { key: 'nearMiss', label: 'Suýt tai nạn (Near Miss)', value: formatMetric(kpis.nearMiss, 'nearMiss'), tone: kpis.nearMiss > 4 ? 'warn' : 'good' },
              { key: 'lti', label: 'Tai nạn mất ngày công (LTI)', value: formatMetric(kpis.lti, 'lti'), tone: kpis.lti > 0 ? 'danger' : 'good' },
              { key: 'fatality', label: 'Tử vong (Fatality)', value: formatMetric(kpis.fatality, 'fatality'), tone: kpis.fatality > 0 ? 'critical' : 'good' },
              { key: 'permanentDisability', label: 'Suy giảm vĩnh viễn', value: formatMetric(kpis.permanentDisability, 'permanentDisability'), tone: kpis.permanentDisability > 0 ? 'critical' : 'good' },
              { key: 'ltifr', label: 'Tần suất LTI (LTIFR)', value: formatMetric(kpis.ltifr, 'ltifr'), tone: kpis.ltifr > 8 ? 'danger' : (kpis.ltifr > 2 ? 'warn' : 'good') },
              { key: 'lostManpower', label: 'Nhân lực ảnh hưởng', value: formatMetric(kpis.lostManpower, 'lostManpower'), tone: kpis.lostManpower > 8 ? 'danger' : (kpis.lostManpower > 3 ? 'warn' : 'good') }
            ];
            els.kpiGrid.innerHTML = configs.map(function(config) {
              var delta = calculateDelta(config.key);
              var deltaTone = delta.tone === 'good' ? 'good' : (delta.tone === 'danger' ? 'danger' : 'warn');
              return '<article class="kpi-card ' + config.tone + '">' +
                '<div class="kpi-label">' + escapeHtml(config.label) + '</div>' +
                '<div class="kpi-value">' + escapeHtml(config.value) + '</div>' +
                '<span class="kpi-delta ' + deltaTone + '">' + escapeHtml(delta.text) + '</span>' +
                '</article>';
            }).join('');
          }

          function setupCanvas(canvas, height) {
            if (!canvas || !canvas.getContext) return null;
            var parent = canvas.parentElement;
            var width = parent ? Math.max(parent.clientWidth || 420, 320) : 420;
            canvas.width = width;
            canvas.height = height;
            canvas.style.height = height + 'px';
            return canvas.getContext('2d');
          }

          function renderLegend(container, items) {
            if (!container) return;
            container.innerHTML = items.map(function(item) {
              return '<span class="legend-item"><i class="legend-dot" style="background:' + item.color + '"></i>' + escapeHtml(item.label) + '</span>';
            }).join('');
          }

          function drawSeverityChart(monthly) {
            var canvas = els.severityCanvas;
            var ctx = setupCanvas(canvas, 360);
            if (!ctx) return;
            chartHits = [];
            var series = Object.keys(SEVERITY);
            var pad = { top: 28, right: 34, bottom: 42, left: 34 };
            var chartW = canvas.width - pad.left - pad.right;
            var chartH = canvas.height - pad.top - pad.bottom;
            var maxTotal = Math.max.apply(null, monthly.map(function(item) { return item.total; }).concat([1]));
            var maxLost = Math.max.apply(null, monthly.map(function(item) { return item.lostManpower; }).concat([1]));
            var slotW = chartW / Math.max(1, monthly.length);
            var barW = Math.max(22, Math.min(54, slotW * 0.5));
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            function yAt(value) {
              return pad.top + chartH - (Number(value) / maxTotal) * chartH;
            }

            function lostYAt(value) {
              return pad.top + chartH - (Number(value) / maxLost) * chartH;
            }

            function centerX(index) {
              return pad.left + slotW * index + slotW / 2;
            }

            ctx.strokeStyle = 'rgba(133,155,230,0.16)';
            ctx.lineWidth = 1;
            for (var gi = 0; gi <= 4; gi += 1) {
              var gy = pad.top + chartH / 4 * gi;
              ctx.beginPath();
              ctx.moveTo(pad.left, gy);
              ctx.lineTo(canvas.width - pad.right, gy);
              ctx.stroke();
            }

            monthly.forEach(function(item, index) {
              var x = centerX(index) - barW / 2;
              var cursorY = pad.top + chartH;
              series.forEach(function(key) {
                var value = Number(item[key]) || 0;
                if (!value) return;
                var h = Math.max(1, (value / maxTotal) * chartH);
                cursorY -= h;
                ctx.fillStyle = SEVERITY[key].color;
                ctx.fillRect(x, cursorY, barW, h);
              });

              ctx.fillStyle = '#f8fafc';
              ctx.font = 'bold 11px Inter,sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(String(item.total), centerX(index), Math.max(14, yAt(item.total) - 8));
              ctx.fillStyle = '#93a5d8';
              ctx.font = '11px Inter,sans-serif';
              ctx.fillText(monthLabel(item.month), centerX(index), canvas.height - 14);
              chartHits.push({
                x1: centerX(index) - Math.max(barW / 2, slotW * 0.34),
                x2: centerX(index) + Math.max(barW / 2, slotW * 0.34),
                y1: pad.top,
                y2: pad.top + chartH,
                data: item
              });
            });

            ctx.beginPath();
            monthly.forEach(function(item, index) {
              var x = centerX(index);
              var y = lostYAt(item.lostManpower);
              if (index === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = '#2dd4bf';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            monthly.forEach(function(item, index) {
              ctx.beginPath();
              ctx.arc(centerX(index), lostYAt(item.lostManpower), 3.2, 0, Math.PI * 2);
              ctx.fillStyle = '#2dd4bf';
              ctx.fill();
            });

            ctx.fillStyle = '#93a5d8';
            ctx.font = '10px Inter,sans-serif';
            ctx.textAlign = 'right';
            for (var yi = 0; yi <= 2; yi += 1) {
              var value = Math.round(maxTotal / 2 * yi);
              ctx.fillText(String(value), pad.left - 6, yAt(value) + 3);
            }

            renderLegend(els.severityLegend, Object.keys(SEVERITY).map(function(key) {
              return { label: SEVERITY[key].label, color: SEVERITY[key].color };
            }).concat([{ label: 'Đường biểu diễn: nhân lực ảnh hưởng', color: '#2dd4bf' }]));

            bindCanvasTooltip(canvas, chartHits, function(item) {
              return '<strong>' + escapeHtml(fullMonthLabel(item.month)) + '</strong>' +
                '<div><span>Suýt tai nạn</span><b>' + item.nearMiss + '</b></div>' +
                '<div><span>Tai nạn nhẹ</span><b>' + item.minor + '</b></div>' +
                '<div><span>Cần điều trị y tế</span><b>' + item.medical + '</b></div>' +
                '<div><span>Tai nạn mất ngày công</span><b>' + item.lti + '</b></div>' +
                '<div><span>Vĩnh viễn / tử vong</span><b>' + item.fatal + '</b></div>' +
                '<div><span>Tổng số vụ</span><b>' + item.total + '</b></div>' +
                '<div><span>Nhân lực ảnh hưởng</span><b>' + item.lostManpower + '</b></div>';
            });

            var dangerous = monthly.slice().sort(function(a, b) {
              return (b.score - a.score) || (b.total - a.total);
            })[0];
            if (els.chartMeta) {
              els.chartMeta.textContent = dangerous && dangerous.total
                ? 'Tháng rủi ro nhất: ' + fullMonthLabel(dangerous.month) + ' - ' + dangerous.total + ' vụ, điểm severity ' + dangerous.score
                : 'Chưa có sự cố trong kỳ lọc';
            }
          }

          function drawLostManpowerChart(monthly) {
            var canvas = els.lostCanvas;
            var ctx = setupCanvas(canvas, 210);
            if (!ctx) return;
            lostChartHits = [];
            var pad = { top: 18, right: 20, bottom: 34, left: 30 };
            var chartW = canvas.width - pad.left - pad.right;
            var chartH = canvas.height - pad.top - pad.bottom;
            var maxVal = Math.max.apply(null, monthly.map(function(item) {
              return Math.max(item.lostManpower, item.ltiCases, item.restrictedWorkCases);
            }).concat([1]));
            var slotW = chartW / Math.max(1, monthly.length);

            function xAt(index) {
              return pad.left + slotW * index + slotW / 2;
            }

            function yAt(value) {
              return pad.top + chartH - (Number(value) / maxVal) * chartH;
            }

            function drawLine(key, color) {
              ctx.beginPath();
              monthly.forEach(function(item, index) {
                var x = xAt(index);
                var y = yAt(item[key]);
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              });
              ctx.strokeStyle = color;
              ctx.lineWidth = 2.2;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke();
              monthly.forEach(function(item, index) {
                ctx.beginPath();
                ctx.arc(xAt(index), yAt(item[key]), 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
              });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(133,155,230,0.16)';
            ctx.lineWidth = 1;
            for (var gi = 0; gi <= 3; gi += 1) {
              var gy = pad.top + chartH / 3 * gi;
              ctx.beginPath();
              ctx.moveTo(pad.left, gy);
              ctx.lineTo(canvas.width - pad.right, gy);
              ctx.stroke();
            }
            drawLine('lostManpower', '#2dd4bf');
            drawLine('ltiCases', '#ef4444');
            drawLine('restrictedWorkCases', '#facc15');
            monthly.forEach(function(item, index) {
              ctx.fillStyle = '#93a5d8';
              ctx.font = '11px Inter,sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(monthLabel(item.month), xAt(index), canvas.height - 12);
              lostChartHits.push({
                x1: xAt(index) - slotW * 0.38,
                x2: xAt(index) + slotW * 0.38,
                y1: pad.top,
                y2: pad.top + chartH,
                data: item
              });
            });
            renderLegend(els.lostLegend, [
              { label: 'Nhân lực ảnh hưởng', color: '#2dd4bf' },
              { label: 'Số vụ LTI', color: '#ef4444' },
              { label: 'Công việc hạn chế', color: '#facc15' }
            ]);
            bindCanvasTooltip(canvas, lostChartHits, function(item) {
              return '<strong>' + escapeHtml(fullMonthLabel(item.month)) + '</strong>' +
                '<div><span>Nhân lực ảnh hưởng</span><b>' + item.lostManpower + '</b></div>' +
                '<div><span>Số vụ LTI</span><b>' + item.ltiCases + '</b></div>' +
                '<div><span>Công việc hạn chế</span><b>' + item.restrictedWorkCases + '</b></div>' +
                '<div><span>Nghỉ dài hạn</span><b>' + item.longTermAbsence + '</b></div>';
            });
          }

          function bindCanvasTooltip(canvas, hits, renderHtml) {
            if (!canvas || !els.tooltip) return;
            canvas.onmousemove = function(event) {
              var rect = canvas.getBoundingClientRect();
              var x = event.clientX - rect.left;
              var y = event.clientY - rect.top;
              var hit = hits.find(function(area) {
                return x >= area.x1 && x <= area.x2 && y >= area.y1 && y <= area.y2;
              });
              if (!hit) {
                hideTooltip();
                return;
              }
              showTooltip(event.clientX, event.clientY, renderHtml(hit.data));
            };
            canvas.onmouseleave = hideTooltip;
          }

          function heatColor(score) {
            if (score <= 0) return 'rgba(90,104,156,0.16)';
            if (score <= 3) return '#7ddf8f';
            if (score <= 7) return '#fde047';
            if (score <= 12) return '#fb923c';
            return '#ef4444';
          }

          function renderHeatmap() {
            if (!els.heatmap) return;
            var heatmap = aggregateProcessHeatmap(filteredRecords);
            var html = '<div class="heat-head"><span></span>' + monthKeys.map(function(month) {
              return '<span>' + escapeHtml(monthLabel(month)) + '</span>';
            }).join('') + '</div>';
            PROCESS_OPTIONS.forEach(function(process) {
              html += '<div class="heat-row"><span class="heat-label">' + escapeHtml(process) + '</span>';
              monthKeys.forEach(function(month) {
                var cell = heatmap[process][month];
                var cls = cell.score ? 'heat-cell' : 'heat-cell empty';
                html += '<div class="' + cls + '" data-process="' + escapeHtml(process) + '" data-month="' + escapeHtml(month) + '" style="background:' + heatColor(cell.score) + '">' + (cell.score || '-') + '</div>';
              });
              html += '</div>';
            });
            els.heatmap.innerHTML = html;
            Array.from(els.heatmap.querySelectorAll('.heat-cell')).forEach(function(cellEl) {
              cellEl.addEventListener('mouseenter', function(event) {
                var process = cellEl.getAttribute('data-process');
                var month = cellEl.getAttribute('data-month');
                var cell = heatmap[process][month];
                showTooltip(event.clientX, event.clientY,
                  '<strong>Công đoạn: ' + escapeHtml(process) + '</strong>' +
                  '<div><span>Tháng</span><b>' + escapeHtml(monthLabel(month)) + '</b></div>' +
                  '<div><span>Tổng số vụ</span><b>' + cell.total + '</b></div>' +
                  '<div><span>Điểm severity</span><b>' + cell.score + '</b></div>' +
                  '<div><span>Suýt tai nạn</span><b>' + cell.nearMiss + '</b></div>' +
                  '<div><span>Tai nạn nhẹ</span><b>' + cell.minor + '</b></div>' +
                  '<div><span>Điều trị y tế</span><b>' + cell.medical + '</b></div>' +
                  '<div><span>LTI</span><b>' + cell.lti + '</b></div>' +
                  '<div><span>Vĩnh viễn / tử vong</span><b>' + cell.fatal + '</b></div>'
                );
              });
              cellEl.addEventListener('mouseleave', hideTooltip);
            });
          }

          function showTooltip(x, y, html) {
            if (!els.tooltip) return;
            els.tooltip.innerHTML = html;
            els.tooltip.style.left = Math.max(120, Math.min(window.innerWidth - 120, x)) + 'px';
            els.tooltip.style.top = Math.max(70, y) + 'px';
            els.tooltip.classList.add('is-visible');
          }

          function hideTooltip() {
            if (els.tooltip) els.tooltip.classList.remove('is-visible');
          }

          function renderTable() {
            if (!els.tableBody || !els.tableMeta) return;
            if (!tableRecords.length) {
              els.tableBody.innerHTML = '<tr><td colspan="16"><div class="empty-state">Không có hồ sơ phù hợp với bộ lọc hiện tại.</div></td></tr>';
              els.tableMeta.textContent = '0 hồ sơ';
              return;
            }
            els.tableMeta.textContent = tableRecords.length + ' hồ sơ';
            els.tableBody.innerHTML = tableRecords.map(function(record) {
              return '<tr data-id="' + escapeHtml(record.id) + '">' +
                '<td><strong>' + escapeHtml(record.id) + '</strong></td>' +
                '<td>' + escapeHtml(formatDate(record.date)) + '</td>' +
                '<td>' + escapeHtml(monthLabel(toMonthKey(record.date))) + '</td>' +
                '<td>' + escapeHtml(record.person) + '</td>' +
                '<td>' + escapeHtml(record.department) + '</td>' +
                '<td>' + escapeHtml(record.process) + '</td>' +
                '<td><span class="badge ' + record.severity + '">' + escapeHtml(SEVERITY[record.severity].shortLabel) + '</span></td>' +
                '<td>' + escapeHtml(LOST_TIME[record.lostTime]) + '</td>' +
                '<td>' + escapeHtml(PERMANENT_IMPACT[record.permanentImpact]) + '</td>' +
                '<td>' + escapeHtml(record.affectedPeople) + '</td>' +
                '<td>' + escapeHtml(record.daysOff) + '</td>' +
                '<td><span class="badge ' + record.status + '">' + escapeHtml(STATUS[record.status]) + '</span></td>' +
                '<td>' + escapeHtml(record.rootCause) + '</td>' +
                '<td>' + escapeHtml(record.correctiveAction) + '</td>' +
                '<td>' + escapeHtml(record.owner) + '</td>' +
                '<td>' + escapeHtml(formatDate(record.dueDate)) + '</td>' +
                '</tr>';
            }).join('');
          }

          function renderAll() {
            renderKpis();
            var monthly = aggregateMonthly(filteredRecords);
            drawSeverityChart(monthly);
            drawLostManpowerChart(monthly);
            renderHeatmap();
            applyTableFilters();
            if (!filteredRecords.length) {
              setState('Không có dữ liệu trong kỳ lọc hiện tại. Hãy mở rộng bộ lọc hoặc nhập hồ sơ mới.', 'error');
            } else {
              setState('Đã tổng hợp ' + filteredRecords.length + ' hồ sơ an toàn lao động từ dữ liệu hiện có.', 'ok');
            }
          }

          function resetFilters() {
            var months = buildRecentMonthKeys(6);
            els.filters.from.value = months[0];
            els.filters.to.value = months[months.length - 1];
            ['process', 'severity', 'team', 'shift', 'status'].forEach(function(key) {
              if (els.filters[key]) els.filters[key].value = 'all';
            });
            Object.keys(els.tableFilters).forEach(function(key) {
              if (els.tableFilters[key]) els.tableFilters[key].value = key === 'search' ? '' : 'all';
            });
            applyFilters();
          }

          function fillForm(record) {
            if (!els.form) return;
            var form = els.form;
            var target = record || createEmptyRecord();
            Object.keys(target).forEach(function(key) {
              if (form.elements[key]) form.elements[key].value = target[key] == null ? '' : target[key];
            });
            editingId = record ? record.id : '';
            if (els.formMode) els.formMode.textContent = record ? 'Đang sửa hồ sơ ' + record.id : 'Tạo hồ sơ mới';
          }

          function createEmptyRecord() {
            var today = new Date();
            var id = 'ATL-' + pad2(today.getMonth() + 1) + pad2(today.getDate()) + '-' + pad2(records.length + 1);
            return {
              id: id,
              date: today.getFullYear() + '-' + pad2(today.getMonth() + 1) + '-' + pad2(today.getDate()),
              time: '08:00',
              process: PROCESS_OPTIONS[0],
              location: '',
              person: '',
              department: TEAM_OPTIONS[0],
              team: TEAM_OPTIONS[0],
              shift: SHIFT_OPTIONS[0],
              description: '',
              severity: 'nearMiss',
              lostTime: 'noLostTime',
              permanentImpact: 'fullRecovery',
              daysOff: 0,
              affectedPeople: 1,
              restrictedWork: 'no',
              longTermAbsence: 'no',
              permanentLost: 'no',
              status: 'open',
              rootCause: '',
              deepCause: '',
              correctiveAction: '',
              owner: '',
              dueDate: today.getFullYear() + '-' + pad2(today.getMonth() + 1) + '-' + pad2(Math.min(today.getDate() + 7, 28)),
              note: ''
            };
          }

          function readFormRecord() {
            var form = els.form;
            var record = {};
            Array.from(form.elements).forEach(function(field) {
              if (!field.name) return;
              record[field.name] = field.value;
            });
            record.team = record.department;
            record.daysOff = Number(record.daysOff) || 0;
            record.affectedPeople = Number(record.affectedPeople) || 0;
            return record;
          }

          function handleFormSubmit(event) {
            event.preventDefault();
            var record = readFormRecord();
            var existingIndex = records.findIndex(function(item) { return item.id === editingId || item.id === record.id; });
            if (existingIndex >= 0) {
              records[existingIndex] = record;
              setState('Đã cập nhật hồ sơ ' + record.id + '.', 'ok');
            } else {
              records.push(record);
              setState('Đã thêm hồ sơ ' + record.id + '.', 'ok');
            }
            fillForm(null);
            refreshTableMonthOptions();
            applyFilters();
          }

          function refreshTableMonthOptions() {
            var months = buildMonthKeysBetween(els.filters.from.value, els.filters.to.value);
            populateSelect(els.tableFilters.month, months, 'Tất cả tháng', function(key) { return key; }, fullMonthLabel);
          }

          function openDetail(recordId) {
            var record = records.find(function(item) { return item.id === recordId; });
            if (!record || !els.detailModal) return;
            selectedDetailId = recordId;
            els.detailTitle.textContent = 'Chi tiết sự cố ' + record.id;
            els.detailMeta.textContent = formatDate(record.date) + ' - ' + record.process + ' - ' + SEVERITY[record.severity].label;
            var details = [
              ['Mã vụ việc', record.id], ['Ngày giờ xảy ra', formatDate(record.date) + ' ' + record.time],
              ['Người liên quan', record.person], ['Bộ phận/tổ/ca', record.department + ' - ' + record.shift],
              ['Công đoạn', record.process], ['Khu vực/vị trí', record.location],
              ['Mức độ', SEVERITY[record.severity].label], ['Mất ngày công', LOST_TIME[record.lostTime]],
              ['Ảnh hưởng vĩnh viễn', PERMANENT_IMPACT[record.permanentImpact]], ['Số người ảnh hưởng', record.affectedPeople],
              ['Số ngày nghỉ', record.daysOff], ['Trạng thái xử lý', STATUS[record.status]],
              ['Mô tả sự việc', record.description], ['Nguyên nhân sơ bộ', record.rootCause],
              ['Nguyên nhân gốc rễ', record.deepCause], ['Biện pháp khắc phục', record.correctiveAction],
              ['Người phụ trách', record.owner], ['Ngày hoàn thành', formatDate(record.dueDate)], ['Ghi chú', record.note]
            ];
            els.detailGrid.innerHTML = details.map(function(pair) {
              return '<div class="detail-item"><small>' + escapeHtml(pair[0]) + '</small><strong>' + escapeHtml(pair[1] || '--') + '</strong></div>';
            }).join('');
            els.detailModal.classList.remove('hidden');
            els.detailModal.setAttribute('aria-hidden', 'false');
          }

          function closeDetail() {
            if (!els.detailModal) return;
            els.detailModal.classList.add('hidden');
            els.detailModal.setAttribute('aria-hidden', 'true');
          }

          function bindEvents() {
            Object.keys(els.filters).forEach(function(key) {
              if (els.filters[key]) {
                els.filters[key].addEventListener('change', function() {
                  refreshTableMonthOptions();
                  applyFilters();
                });
              }
            });
            Object.keys(els.tableFilters).forEach(function(key) {
              if (els.tableFilters[key]) {
                els.tableFilters[key].addEventListener(key === 'search' ? 'input' : 'change', applyTableFilters);
              }
            });
            if (els.resetBtn) els.resetBtn.addEventListener('click', resetFilters);
            if (els.newBtn) {
              els.newBtn.addEventListener('click', function() {
                fillForm(null);
                if (els.form) els.form.scrollIntoView({ behavior: 'smooth', block: 'start' });
              });
            }
            if (els.form) els.form.addEventListener('submit', handleFormSubmit);
            if (els.cancelEditBtn) els.cancelEditBtn.addEventListener('click', function() { fillForm(null); });
            if (els.tableBody) {
              els.tableBody.addEventListener('click', function(event) {
                var row = event.target.closest('tr[data-id]');
                if (row) openDetail(row.getAttribute('data-id'));
              });
            }
            root.querySelectorAll('th[data-sort]').forEach(function(th) {

          }

          var handleSearch = null;
          var handleFilter = null;

          function bindEvents() {
            if (tableBody) tableBody.addEventListener('click', handleTableClick);
            if (pagination) pagination.addEventListener('click', handlePaginationClick);

            handleSearch = debounce(function () {
              currentPage = 1;
              updateView();
            }, 200);

            handleFilter = function () {
              currentPage = 1;
              updateView();
            };

            if (searchInput) searchInput.addEventListener('input', handleSearch);
            if (departmentSelect) departmentSelect.addEventListener('change', handleFilter);
            if (backBtn) backBtn.addEventListener('click', showListView);
          }

          function init() {
            if (!queryElements()) return;
            destroy();
            bindEvents();
            currentPage = 1;
            pageSize = PAGE_SIZE;
            employeeCache = [];
            employeeIndex = [];
            filteredCache = [];
            loadData(true);
            startClock();
            refreshTimerId = window.setInterval(function () { loadData(false); }, REFRESH_MS);
          }

          function destroy() {
            if (refreshTimerId) {
              window.clearInterval(refreshTimerId);
              refreshTimerId = null;
            }

            if (clockTimerId) {
              window.clearInterval(clockTimerId);
              clockTimerId = null;
            }

            if (tableBody) {
              tableBody.removeEventListener('click', handleTableClick);
            }

            if (pagination) {
              pagination.removeEventListener('click', handlePaginationClick);
            }

            if (searchInput && handleSearch) {
              searchInput.removeEventListener('input', handleSearch);
              handleSearch = null;
            }

            if (departmentSelect && handleFilter) {
              departmentSelect.removeEventListener('change', handleFilter);
              handleFilter = null;
            }

            if (backBtn) {
              backBtn.removeEventListener('click', showListView);
            }
          }

          return { init: init, destroy: destroy };
        })();

        function start() {
          applyUserIdentity_();
          if (appStarted) {
            navigate(window.location.hash.slice(1) || currentRoute || 'dashboard', false);
            return;
          }

          appStarted = true;
          hydrateSidebar().then(function () {
            navigate(window.location.hash.slice(1) || 'dashboard', false);
          });
        }

        function stop() {
          if (!appStarted) return;
          appStarted = false;

          if (ROUTES[currentRoute] && typeof ROUTES[currentRoute].leave === 'function') {
            ROUTES[currentRoute].leave();
          }

          menuItems.forEach(function (item) {
            item.removeEventListener('click', handleMenuClick);
          });
          menuItems = [];
          menuRoot = null;
          currentRoute = 'dashboard';

          if (logoutBtn) {
            logoutBtn.removeEventListener('click', handleLogoutClick);
            logoutBtn = null;
          }

          if (mainContent) {
            mainContent.innerHTML = '';
          }
        }

        return {
          start: start,
          stop: stop
        };
      })();

      window.AuthApp.init().catch(function (error) {
        if (window.console && console.error) {
          console.error('AuthApp init failed:', error);
        }
      });
  </script>
</body>

</html>
